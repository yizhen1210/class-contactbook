<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>班級聯絡簿</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#587069">
    <meta name="apple-mobile-web-app-title" content="班級聯絡簿">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="icon-180.png">
    <link rel="icon" type="image/png" href="icon-192.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Iansui&display=swap" rel="stylesheet">
    <style>
        :root {
            --board: #587069;
            --board-2: #647e78;
            --chalk: #f3f1ea;
            --chalk-dim: #cdd3cb;
            --circle: #42544d;
            --wood: #93826b;
            --wood-dark: #756950;
            --p-year: #c3452d;
            --p-month: #c87646;
            --p-day: #05798e;
            --del-color: #c4674f;
        }
        * { box-sizing: border-box; }
        html, body { margin: 0; padding: 0; }
        body {
            font-family: 'Iansui', sans-serif;
            background: #e8e8e2;
            color: var(--chalk);
            -webkit-font-smoothing: antialiased;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        .frame {
            --pad: 120px;
            width: 100%;
            max-width: 1100px;
            margin: 0 auto;
            flex: 1 0 auto;
            background: var(--board);
            background-image:
                radial-gradient(circle at 20% 30%, rgba(255,255,255,0.035), transparent 45%),
                radial-gradient(circle at 80% 70%, rgba(255,255,255,0.03), transparent 45%);
            border-left: 26px solid var(--wood);
            border-right: 26px solid var(--wood);
            box-shadow: inset 0 0 90px rgba(0,0,0,0.35);
            padding: 20px var(--pad) 0;
            display: flex;
            flex-direction: column;
        }

        /* 標題 */
        .header { display: flex; align-items: center; justify-content: space-between; gap: 16px; flex-wrap: wrap; padding-bottom: 16px; border-bottom: 1px solid rgba(244,241,232,0.22); }
        .header h1 { margin: 0; font-size: 44px; color: var(--chalk); display: flex; align-items: center; gap: 12px; letter-spacing: 1px; }
        .header h1 .bag { user-select: none; -webkit-user-select: none; touch-action: manipulation; cursor: default; }
        .header h1 .num { color: #ffe6b0; }
        .edit-pencil { width: 44px; height: 44px; border-radius: 50%; border: 2px solid var(--chalk); background: transparent; color: var(--chalk); font-size: 22px; cursor: pointer; line-height: 1; padding: 0; }
        .edit-pencil:hover { background: rgba(244,241,232,0.15); }
        .logout-btn { background: transparent; color: var(--del-color); border: 2px solid var(--del-color); padding: 9px 22px; border-radius: 50px; cursor: pointer; font-family: inherit; font-size: 1.05em; white-space: nowrap; }
        .logout-btn:hover { background: var(--del-color); color: #fff; }

        /* 日期列 */
        .date-row { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; padding: 12px 2px 16px; font-size: 38px; }
        .dateline { display: inline-flex; align-items: center; gap: 12px; flex-wrap: wrap; }
        .date-row .num { color: #fff; font-weight: bold; -webkit-text-stroke: 0.5px #fff; }
        .tag { font-size: 1em; line-height: 1; background: #f1f0e9; border: 2px solid; font-weight: bold; -webkit-text-stroke: 0.5px currentColor; }
        .tag.y, .tag.m, .tag.d { display: inline-flex; align-items: center; justify-content: center; width: 1.5em; height: 1.5em; border-radius: 50%; }
        .tag.y { color: #bb482f; border-color: #bb482f; padding-bottom: 0.05em; }
        .tag.m { color: #c57249; border-color: #c57249; padding-bottom: 0.12em; }
        .tag.d { color: #8f7a60; border-color: #8f7a60; padding-bottom: 0.12em; }
        .tag.wk { color: #05798c; border-color: #05798c; border-radius: 0.42em; height: 1.5em; padding: 0 0.2em; display: inline-flex; align-items: center; }
        .wkwrap { display: inline-flex; align-items: center; gap: 3px; margin-left: 4px; }
        .wd { color: #fff; font-weight: bold; -webkit-text-stroke: 0.5px #fff; }
        .date-stamp { margin-left: auto; color: var(--chalk-dim); font-size: 16px; }

        /* 聯絡事項 */
        .items { list-style: none; margin: 0; padding: 8px 2px 0; }
        .items li { display: flex; align-items: center; gap: 20px; padding: 16px 2px; }
        .items .circle {
            flex: none; width: 50px; height: 50px; border-radius: 50%;
            background: var(--circle); color: #fff;
            display: flex; align-items: center; justify-content: center; font-size: 30px; font-weight: bold;
        }
        .items .txt { color: #fff; font-size: 31px; line-height: 1.4; letter-spacing: 0.5px; }
        .items .txt.hl { color: #ffde59; }
        .empty-note { color: var(--chalk-dim); font-size: 26px; padding: 40px 2px; text-align: center; }

        /* 粉筆槽 */
        .chalk-tray { margin: 20px calc(-1 * var(--pad)) 0; margin-top: auto; height: 22px; background: var(--wood); border-top: 2px solid var(--wood-dark); position: relative; }
        .chalk-tray::before, .chalk-tray::after { content: ''; position: absolute; top: -6px; height: 7px; border-radius: 5px; }
        .chalk-tray::before { left: 12%; width: 60px; background: #f4f1e8; }
        .chalk-tray::after { left: calc(12% + 78px); width: 38px; background: #c4bdac; }

        /* ===== 老師編輯區 ===== */
        .admin { background: var(--board-2); border: 1px solid rgba(244,241,232,0.25); border-radius: 14px; padding: 20px 22px; margin: 18px 0 4px; }
        .admin-title { color: #ffe6b0; font-size: 1.45em; margin: 0 0 4px; }
        .admin-sub { color: var(--chalk-dim); font-size: 0.95em; margin: 0 0 16px; }
        .hw-row { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; padding: 8px 0; border-bottom: 1px solid rgba(244,241,232,0.12); }
        .hw-on { width: 24px; height: 24px; accent-color: var(--p-day); flex: none; cursor: pointer; }
        .hw-subj { height: 42px; border-radius: 10px; background: rgba(255,255,255,0.07); border: 1px solid rgba(244,241,232,0.4); color: var(--chalk); font-family: inherit; font-size: 1em; padding: 0 8px; cursor: pointer; }
        .hw-subj option { color: #233; }
        .hw-field { display: inline-flex; align-items: center; gap: 6px; font-size: 1em; color: var(--chalk-dim); }
        .add-line-btn { border: 1px dashed var(--chalk); background: transparent; color: var(--chalk); padding: 9px 16px; border-radius: 10px; font-family: inherit; font-size: 1em; cursor: pointer; }
        .add-line-btn:hover { background: rgba(244,241,232,0.12); }
        .acc { border-bottom: 1px solid rgba(244,241,232,0.12); }
        .acc-head { display: flex; align-items: center; gap: 10px; padding: 13px 2px; cursor: pointer; user-select: none; }
        .acc-arrow { color: var(--chalk-dim); width: 16px; text-align: center; }
        .acc-name { font-size: 1.2em; color: var(--chalk); }
        .acc-badge { background: var(--p-day); color: #fff; font-size: 0.78em; min-width: 22px; height: 22px; border-radius: 11px; display: inline-flex; align-items: center; justify-content: center; padding: 0 6px; }
        .acc-body { padding: 0 0 12px 26px; }
        .acc-body:empty { display: none; }
        .hw-static { color: var(--chalk); font-size: 1.05em; }
        .input { background: rgba(255,255,255,0.07); border: 1px solid rgba(244,241,232,0.4); border-radius: 10px; font-family: inherit; color: var(--chalk); }
        .field .input { width: 64px; height: 40px; text-align: center; font-size: 1.1em; }
        .input:focus { outline: none; border-color: var(--chalk); box-shadow: 0 0 0 3px rgba(244,241,232,0.18); }
        .input::placeholder { color: rgba(244,241,232,0.45); }
        .rowbtn { background: transparent; border: 1px solid var(--del-color); color: var(--del-color); border-radius: 8px; padding: 6px 12px; cursor: pointer; font-family: inherit; font-size: 0.95em; }
        .rowbtn:hover { background: var(--del-color); color: #fff; }

        .extra-row { display: flex; gap: 10px; margin-bottom: 10px; }
        .extra-row .input { flex: 1; height: 44px; padding: 0 16px; font-size: 1.05em; }
        .add-line { border: 1px dashed var(--chalk); background: transparent; color: var(--chalk); padding: 11px 16px; border-radius: 10px; font-family: inherit; font-size: 1.05em; width: 100%; cursor: pointer; }
        .add-line:hover { background: rgba(244,241,232,0.12); }

        .input.hw-type { flex: 1 1 180px; min-width: 140px; height: 42px; padding: 0 14px; font-size: 1.02em; }
        .input.hw-num { width: 58px; height: 42px; text-align: center; font-size: 1.05em; padding: 0; }

        .publish-bar { display: flex; align-items: center; gap: 16px; flex-wrap: wrap; margin-top: 24px; }
        .btn-publish { background: var(--p-day); color: #fff; border: none; padding: 14px 34px; border-radius: 50px; cursor: pointer; font-family: inherit; font-size: 1.2em; }
        .btn-publish:hover { filter: brightness(1.08); }
        .btn-ghost { background: transparent; color: var(--chalk); border: 2px solid var(--chalk); padding: 12px 24px; border-radius: 50px; cursor: pointer; font-family: inherit; font-size: 1.02em; }
        .btn-ghost:hover { background: rgba(244,241,232,0.15); }
        .pub-stamp { color: var(--chalk-dim); font-size: 1em; }

        /* 署名 */
        .credit { text-align: center; color: #8a8d84; font-size: 15px; letter-spacing: 0.5px; padding: 14px 0 22px; }

        /* 登入框 */
        .hidden { display: none !important; }
        .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.45); align-items: center; justify-content: center; z-index: 1000; }
        .modal-content { background: #e8e8e2; border: 3px solid var(--wood); padding: 36px 44px; border-radius: 20px; text-align: center; box-shadow: 0 20px 55px rgba(0,0,0,0.4); width: min(520px, 90vw); }
        .modal-title { font-size: 1.4em; color: #3f514a; margin: 0 0 22px; }
        .modal-content input { display: block; width: 100%; margin: 0 0 24px; padding: 12px 18px; border: 2px solid #05798c; border-radius: 14px; font-family: inherit; font-size: 1.1em; outline: none; text-align: center; background: #fff; color: #2e3a35; }
        .modal-content input::placeholder { color: #9aa39d; }
        .modal-actions { display: flex; justify-content: center; gap: 18px; }
        .modal-actions button { padding: 11px 38px; border-radius: 50px; cursor: pointer; font-family: inherit; font-size: 1.15em; border: 2px solid #05798c; }
        .modal-actions .btn-ok { background: #05798c; color: #fff; }
        .modal-actions .btn-ok:hover { background: #066a7b; }
        .modal-actions .btn-cancel { background: transparent; color: #5a6660; border-color: #b4bab2; }
        .modal-actions .btn-cancel:hover { background: rgba(0,0,0,0.05); }
        .switch-acct { background: none; border: none; color: #6f756d; font-family: inherit; font-size: 0.95em; text-decoration: underline; cursor: pointer; margin: -12px 0 18px; display: block; width: 100%; text-align: center; }
        .switch-acct:hover { color: #3f514a; }

        /* 投影按鈕 */
        .cast-btn { background: transparent; color: var(--chalk); border: 2px solid var(--chalk); padding: 9px 20px; border-radius: 50px; cursor: pointer; font-family: inherit; font-size: 1.02em; white-space: nowrap; }
        .cast-btn:hover { background: rgba(244,241,232,0.15); }
        .cast-exit { display: none; position: fixed; top: 18px; right: 22px; z-index: 1100; width: 54px; height: 54px; border-radius: 50%; border: 2px solid var(--chalk); background: rgba(36,59,55,0.85); color: var(--chalk); font-size: 26px; cursor: pointer; }
        .cast-exit:hover { background: rgba(244,241,232,0.18); }

        /* ===== RWD:平板(641–1024) ===== */
        @media (min-width: 641px) and (max-width: 1024px) {
            .frame { max-width: 840px; --pad: 44px; }
            .header h1 { font-size: 38px; }
            .date-row { font-size: 34px; }
            .items li { gap: 20px; padding: 16px 2px; }
            .items .circle { width: 50px; height: 50px; font-size: 30px; }
            .items .txt { font-size: 30px; }
        }

        /* ===== RWD:大尺寸電腦/螢幕(≥1280) ===== */
        @media (min-width: 1280px) {
            .header h1 { font-size: 48px; }
            .date-row { font-size: 42px; }
            .items .circle { width: 54px; height: 54px; font-size: 32px; }
            .items .txt { font-size: 34px; }
        }

        /* ===== 投影模式(按鈕切換,不靠寬度) ===== */
        .cast-mode .frame { max-width: none; min-height: 100vh; border-left-width: 30px; border-right-width: 30px; padding: 6vh var(--pad) 0; justify-content: flex-start; }
        .cast-mode .admin, .cast-mode .logout-btn, .cast-mode .edit-pencil, .cast-mode .cast-btn, .cast-mode .credit, .cast-mode .header { display: none !important; }
        .cast-mode .date-row { padding: 0 2px 22px; gap: 16px; font-size: var(--castItem, 54px); }
        .cast-mode .date-stamp { font-size: 0.42em; }
        .cast-mode .items { padding-top: 6px; flex: 0 0 auto; }
        .cast-mode .items li { padding: calc(var(--castItem, 54px) * 0.18) 2px; gap: 22px; }
        .cast-mode .items .circle { width: calc(var(--castItem, 54px) * 1.4); height: calc(var(--castItem, 54px) * 1.4); font-size: var(--castItem, 54px); }
        .cast-mode .items .txt { font-size: var(--castItem, 54px); }
        .cast-mode .chalk-tray { margin-top: auto; height: 24px; }
        .cast-mode .cast-exit { display: flex; align-items: center; justify-content: center; }

        /* ===== RWD:手機(≤640) ===== */
        @media (max-width: 640px) {
            .frame { --pad: 18px; border-left-width: 12px; border-right-width: 12px; }
            .cast-btn { display: none; }
            .header { justify-content: center; }
            .header h1 { font-size: 30px; }
            .edit-pencil { width: 36px; height: 36px; font-size: 18px; }
            .date-row { gap: 6px; padding: 14px 0 12px; font-size: min(24px, calc((100vw - 60px) / 13)); flex-wrap: nowrap; justify-content: center; }
            .dateline { flex-wrap: nowrap; gap: 5px; white-space: nowrap; }
            .date-stamp { display: none; }
            .items { padding-top: 4px; }
            .items li { gap: 13px; padding: 7px 2px; }
            .items .circle { width: 38px; height: 38px; font-size: 21px; }
            .items .txt { font-size: 21px; }
            .chalk-tray { height: 16px; }
            .credit { padding: 10px 0 14px; }
            .input.hw-type { flex: 1 1 100%; }
            .publish-bar { flex-direction: column; align-items: stretch; }
            .btn-publish, .btn-ghost { width: 100%; }
            .modal-content { padding: 26px 22px; width: min(420px, 88vw); }
        }
    </style>
</head>
<body>
  <div class="frame">
    <div class="header">
        <h1><span class="bag">🍎</span><span class="num" id="className">508</span><button id="editClassBtn" class="edit-pencil admin-only hidden" title="更新班級">✏️</button><span>班級聯絡簿</span></h1>
        <span style="display:flex; gap:12px; align-items:center;">
            <button id="castBtn" class="cast-btn">投影模式</button>
            <button id="logoutBtn" class="logout-btn admin-only hidden">登出</button>
        </span>
    </div>
    <button id="castExit" class="cast-exit" title="離開投影模式">✕</button>

    <!-- 老師編輯區 -->
    <div id="adminArea" class="admin admin-only hidden">
        <h2 class="admin-title">書寫作業</h2>
        <p class="admin-sub">點科目展開，勾選要列入的作業；可填 L 課數與頁數（頁數填起、迄會自動展開連續多頁）</p>
        <div id="hwList"></div>

        <h2 class="admin-title" style="margin-top:24px;">習作簽名</h2>
        <div id="wbList"></div>

        <h2 class="admin-title" style="margin-top:24px;">考試訂簽</h2>
        <p class="admin-sub">點科目展開，新增要訂簽的項目</p>
        <div id="reviewList"></div>

        <h2 class="admin-title" style="margin-top:24px;">考試</h2>
        <p class="admin-sub">點科目展開，新增小考或段考</p>
        <div id="examList"></div>

        <h2 class="admin-title" style="margin-top:24px;">其他事項</h2>
        <p class="admin-sub">臨時、非固定的項目，如帶物品</p>
        <div id="extraList"></div>
        <button class="add-line" id="addExtra">＋ 新增一項</button>

        <div class="publish-bar">
            <button class="btn-publish" id="publishBtn">發布今日聯絡簿</button>
            <button class="btn-ghost" id="copyLink">複製家長連結</button>
            <span class="pub-stamp" id="pubStamp"></span>
        </div>
    </div>

    <!-- 日期 -->
    <div class="date-row" id="dateRow"></div>

    <!-- 今日聯絡事項 -->
    <ul class="items" id="itemList"></ul>

    <div class="chalk-tray"></div>
  </div>
  <footer class="credit">created by 怡臻老師</footer>

    <div id="inputModal" class="modal-overlay">
        <div class="modal-content">
            <p class="modal-title">請輸入老師專屬密碼才能編輯：</p>
            <input type="password" id="passInput" placeholder="密碼" autocomplete="current-password">
            <div class="modal-actions">
                <button class="btn-ok" onclick="checkPass()">確定</button>
                <button class="btn-cancel" onclick="closeModal()">取消</button>
            </div>
        </div>
    </div>

    <script>
        if (localStorage.getItem('teacherHint') === '1') {
            document.addEventListener('DOMContentLoaded', () => {
                document.documentElement.classList.add('teacher-mode');
                document.querySelectorAll('.admin-only').forEach(e => e.classList.remove('hidden'));
            });
        }
    </script>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, onSnapshot, setDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // 聯絡簿專用的 Firebase 專案(class-contactbook)。資料存在 config/contactBook。
        const firebaseConfig = { apiKey: "AIzaSyAiT81oV4A-JUmtvNZHNIaN0Vjbf9H0jMo", authDomain: "class-contactbook.firebaseapp.com", projectId: "class-contactbook", storageBucket: "class-contactbook.firebasestorage.app", messagingSenderId: "775848726685", appId: "1:775848726685:web:b0dcdcdb680ad9fff78474" };
        const db = getFirestore(initializeApp(firebaseConfig));
        const auth = getAuth();
        // 帳號只會由你在 Firebase 主控台建立,因此任何成功登入者都視為老師(寫入權限另由 Firestore 規則的 email 清單把關)
        const $ = (id) => document.getElementById(id);
        const bookRef = doc(db, 'config', 'contactBook');

        const WEEKDAYS = ["日","一","二","三","四","五","六"];
        const SUBJ_NAME = {chi:"國語", mat:"數學", sci:"自然", soc:"社會", eng:"英文", etc:"其他"};
        const SUBJ_ORDER = {chi:0, mat:1, sci:2, soc:3, eng:4, etc:5};
        const HW_SUBJ = ["chi","mat","sci","soc","eng","etc"];
        const EXAM_SUBJ = ["chi","mat","sci","soc","eng"];

        let isTeacher = false;
        let editorReady = false;
        let hwEntries = [{id:"h1",subj:"chi",on:false,name:"習作",lesson:"",pStart:"",pEnd:""},{id:"h2",subj:"mat",on:false,name:"課本",lesson:"",pStart:"",pEnd:""}];
        let reviewEntries = [];   // {id,subj,on,lesson,pStart,pEnd}
        let examEntries = [];     // {id,subj,on,type,lesson,pStart,pEnd}
        let wbSign = {chi:{on:false,pStart:"",pEnd:""}, mat:{on:false,pStart:"",pEnd:""}};
        let extras = ["帶大袋子"];
        let className = "508";
        const openSet = {};       // 折疊狀態(僅介面用)

        function uid(p){ return p+Math.random().toString(36).slice(2,7); }
        function sTrim(v){ return (v!=null && String(v).trim()!=="") ? String(v).trim() : ""; }
        function pagesText(a,b){
            a=parseInt(a,10); b=parseInt(b,10);
            if(isNaN(a)) return "";
            if(isNaN(b) || b<=a) return ""+a;
            if(b-a>60) return a+"～"+b;
            const arr=[]; for(let i=a;i<=b;i++) arr.push(i);
            return arr.join("、");
        }
        function pTxt(a,b){ const pg=pagesText(a,b); return pg ? ("p."+pg) : ""; }
        function withLP(t, e){ const L=sTrim(e.lesson); if(L) t+=" L"+L; const pg=pTxt(e.pStart,e.pEnd); if(pg) t+=" "+pg; return t; }
        function hwText(e){ const p=[]; const n=sTrim(e.name); if(n)p.push(n); const L=sTrim(e.lesson); if(L)p.push("L"+L); const pg=pTxt(e.pStart,e.pEnd); if(pg)p.push(pg); return p.join(" "); }
        function reviewText(e){ return withLP(SUBJ_NAME[e.subj]+"考試訂簽", e); }
        function examText(e){ return withLP(SUBJ_NAME[e.subj]+(e.type||"小考"), e); }

        function buildItems(){
            const out=[];
            const bySubj=(a,b)=> (SUBJ_ORDER[a.e.subj]??9)-(SUBJ_ORDER[b.e.subj]??9) || a.i-b.i;
            hwEntries.map((e,i)=>({e,i})).filter(o=>o.e.on).sort(bySubj).forEach(o=>{ const t=hwText(o.e); if(t) out.push(t); });
            ["chi","mat"].forEach(s=>{ const w=wbSign[s]; if(w&&w.on){ let t=SUBJ_NAME[s]+"習作簽名"; const pg=pTxt(w.pStart,w.pEnd); if(pg) t+=" "+pg; out.push(t); } });
            reviewEntries.map((e,i)=>({e,i})).filter(o=>o.e.on).sort(bySubj).forEach(o=> out.push(reviewText(o.e)));
            examEntries.map((e,i)=>({e,i})).filter(o=>o.e.on).sort((a,b)=> ((a.e.type==="段考")-(b.e.type==="段考")) || bySubj(a,b)).forEach(o=> out.push(examText(o.e)));
            extras.forEach(t=>{ if(t&&t.trim()) out.push(t.trim()); });
            return out;
        }
        function arrOf(sec){ return sec==="hw"?hwEntries : sec==="rv"?reviewEntries : sec==="ex"?examEntries : null; }
        function findE(sec,id){ const a=arrOf(sec); return a ? a.find(e=>e.id===id) : null; }
        function newEntry(sec, sid){
            if(sec==="hw") return {id:uid("h"),subj:sid,on:true,name:"",lesson:"",pStart:"",pEnd:""};
            if(sec==="rv") return {id:uid("r"),subj:sid,on:true,lesson:"",pStart:"",pEnd:""};
            return {id:uid("x"),subj:sid,on:true,type:"小考",lesson:"",pStart:"",pEnd:""};
        }
        function rocParts(){ const n=new Date(); return {y:n.getFullYear()-1911,m:n.getMonth()+1,d:n.getDate(),w:WEEKDAYS[n.getDay()]}; }
        function esc(s){ return String(s).replace(/[&<>]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;"}[c])); }

        function renderPublished(pub){
            const dp = (pub && pub.date) ? pub.date : rocParts();
            $('dateRow').innerHTML = `<span class="dateline"><span class="num">${dp.y}</span><span class="tag y">年</span>`
                + `<span class="num">${dp.m}</span><span class="tag m">月</span>`
                + `<span class="num">${dp.d}</span><span class="tag d">日</span>`
                + `<span class="wkwrap"><span class="tag wk">星期</span><span class="wd">${dp.w}</span></span></span>`
                + ((pub && pub.label) ? `<span class="date-stamp">更新於 ${esc(pub.label)}</span>` : '');

            const items = (pub && pub.items) ? pub.items : [];
            if(!items.length){ $('itemList').innerHTML = `<li class="empty-note">今天還沒有發布聯絡簿</li>`; }
            else { $('itemList').innerHTML = items.map((t,i)=> { const hl=(t.indexOf('簽名')>=0||t.indexOf('訂簽')>=0)?' hl':''; return `<li><span class="circle">${i+1}</span><span class="txt${hl}">${esc(t)}</span></li>`; }).join(''); }
            requestAnimationFrame(fitCast);
        }

        function pageFields(k,e){ return `<span class="hw-field">p.<input class="input hw-num" type="number" min="1" value="${esc(e.pStart||'')}" data-f="${k}:pStart"> ～ <input class="input hw-num" type="number" min="1" value="${esc(e.pEnd||'')}" data-f="${k}:pEnd"></span>`; }
        function hwRow(sec,e){ const k=sec+":"+e.id; return `<div class="hw-row"><input type="checkbox" class="hw-on" data-on="${k}" ${e.on?'checked':''}>`
            + `<input class="input hw-type" placeholder="作業名稱，如 習作 / 課本 / 甲本" value="${esc(e.name||'')}" data-f="${k}:name">`
            + `<span class="hw-field">L<input class="input hw-num" type="number" min="1" value="${esc(e.lesson||'')}" data-f="${k}:lesson"></span>`
            + pageFields(k,e) + `<button class="rowbtn" data-del="${k}">刪除</button></div>`; }
        function reviewRow(sec,e){ const k=sec+":"+e.id; return `<div class="hw-row"><input type="checkbox" class="hw-on" data-on="${k}" ${e.on?'checked':''}>`
            + `<span class="hw-static">考試訂簽</span>`
            + `<span class="hw-field">L<input class="input hw-num" type="number" min="1" value="${esc(e.lesson||'')}" data-f="${k}:lesson"></span>`
            + pageFields(k,e) + `<button class="rowbtn" data-del="${k}">刪除</button></div>`; }
        function examRow(sec,e){ const k=sec+":"+e.id; const opt=t=>`<option value="${t}" ${(e.type||'小考')===t?'selected':''}>${t}</option>`;
            return `<div class="hw-row"><input type="checkbox" class="hw-on" data-on="${k}" ${e.on?'checked':''}>`
            + `<select class="hw-subj" data-f="${k}:type">${opt('小考')}${opt('段考')}</select>`
            + `<span class="hw-field">L<input class="input hw-num" type="number" min="1" value="${esc(e.lesson||'')}" data-f="${k}:lesson"></span>`
            + pageFields(k,e) + `<button class="rowbtn" data-del="${k}">刪除</button></div>`; }
        function accordion(sec, subjList, entriesArr, rowFn){
            return subjList.map(sid=>{
                const ents = entriesArr.filter(e=>e.subj===sid);
                const open = !!openSet[sec+":"+sid];
                const cc = ents.filter(e=>e.on).length;
                const body = open ? (ents.map(e=>rowFn(sec,e)).join('') + `<button class="add-line-btn" data-add="${sec}:${sid}">＋ 新增</button>`) : "";
                return `<div class="acc ${open?'open':''}">`
                    + `<div class="acc-head" data-acc="${sec}:${sid}"><span class="acc-arrow">${open?'▾':'▸'}</span><span class="acc-name">${esc(SUBJ_NAME[sid])}</span>${cc?`<span class="acc-badge">${cc}</span>`:''}</div>`
                    + `<div class="acc-body">${body}</div></div>`;
            }).join('');
        }
        function renderEditor(){
            $('hwList').innerHTML = accordion('hw', HW_SUBJ, hwEntries, hwRow);
            $('wbList').innerHTML = ["chi","mat"].map(s=>{ const w=wbSign[s]||{};
                return `<div class="hw-row"><input type="checkbox" class="hw-on" data-wbon="${s}" ${w.on?'checked':''}><span class="hw-static">${esc(SUBJ_NAME[s])}習作簽名</span>`
                    + `<span class="hw-field">p.<input class="input hw-num" type="number" min="1" value="${esc(w.pStart||'')}" data-wb="${s}:pStart"> ～ <input class="input hw-num" type="number" min="1" value="${esc(w.pEnd||'')}" data-wb="${s}:pEnd"></span></div>`;
            }).join('');
            $('reviewList').innerHTML = accordion('rv', EXAM_SUBJ, reviewEntries, reviewRow);
            $('examList').innerHTML = accordion('ex', EXAM_SUBJ, examEntries, examRow);
            $('extraList').innerHTML = extras.map((t,i)=>
                `<div class="extra-row"><input class="input" value="${esc(t)}" data-ex="${i}" placeholder="輸入事項，如 帶大袋子"><button class="rowbtn" data-del-ex="${i}">刪除</button></div>`
            ).join('');
        }

        let saveTimer = null;
        function saveConfig(){ clearTimeout(saveTimer); saveTimer=setTimeout(()=>{ setDoc(bookRef,{hwEntries,reviewEntries,examEntries,wbSign,extras,className},{merge:true}).catch(e=>console.warn(e)); },700); }
        async function publish(){
            const dp = rocParts(); const now = new Date();
            const label = `${dp.y}/${dp.m}/${dp.d} ${now.getHours()}:${("0"+now.getMinutes()).slice(-2)}`;
            try{ await setDoc(bookRef,{hwEntries,reviewEntries,examEntries,wbSign,extras,className,published:{items:buildItems(),date:dp,label}},{merge:true}); $('pubStamp').textContent="已發布 · "+label; }
            catch(e){ alert("發布失敗，請確認已登入且 Firestore 規則允許寫入"); console.warn(e); }
        }

        onSnapshot(bookRef, (snap)=>{
            const data = snap.exists() ? snap.data() : null;
            if(data){
                if(data.className){ className=data.className; $('className').innerText=className; }
                renderPublished(data.published || null);
                if(isTeacher && !editorReady){
                    if(Array.isArray(data.hwEntries)) hwEntries=data.hwEntries;
                    if(Array.isArray(data.reviewEntries)) reviewEntries=data.reviewEntries;
                    if(Array.isArray(data.examEntries)) examEntries=data.examEntries;
                    if(data.wbSign && typeof data.wbSign==='object') wbSign=Object.assign({chi:{on:false,pStart:"",pEnd:""},mat:{on:false,pStart:"",pEnd:""}}, data.wbSign);
                    if(Array.isArray(data.extras)) extras=data.extras;
                    editorReady=true; renderEditor();
                }
            } else { renderPublished(null); }
        }, err=>{ console.warn(err); renderPublished(null); });

        // 兩位老師共用同一組編輯帳號:email 寫死在這裡,老師只需輸入密碼。把下面換成你那組共用編輯帳號的 email。
        const SHARED_EMAIL = "annychen1210@gmail.com";
        window.checkPass = async () => {
            const pw=$('passInput').value; if(!pw) return;
            try{ await signInWithEmailAndPassword(auth,SHARED_EMAIL,pw); window.closeModal(); }
            catch(err){ alert("密碼錯誤"); $('passInput').value=''; $('passInput').focus(); }
        };
        window.closeModal = () => { $('inputModal').style.display='none'; $('passInput').value=''; };
        window.openLogin = () => { $('passInput').value=''; $('inputModal').style.display='flex'; setTimeout(()=>$('passInput').focus(),50); };

        let bagTaps=0, bagTimer=null;
        document.querySelector('.bag').addEventListener('click', ()=>{
            bagTaps++; clearTimeout(bagTimer); bagTimer=setTimeout(()=>{bagTaps=0;},600);
            if(bagTaps>=3){ bagTaps=0; clearTimeout(bagTimer);
                if(isTeacher){ signOut(auth); } else { window.openLogin(); }
            }
        });
        $('passInput').addEventListener('keydown', e=>{ if(e.key==='Enter') window.checkPass(); });

        function applyTeacherUI(){
            if(isTeacher){
                localStorage.setItem('teacherHint','1');
                document.documentElement.classList.add('teacher-mode');
                document.querySelectorAll('.admin-only').forEach(e=>e.classList.remove('hidden'));
                if(!editorReady) renderEditor();
            } else {
                localStorage.removeItem('teacherHint');
                document.documentElement.classList.remove('teacher-mode');
                document.querySelectorAll('.admin-only').forEach(e=>e.classList.add('hidden'));
            }
        }
        onAuthStateChanged(auth, (user)=>{ isTeacher=!!user; applyTeacherUI(); });

        document.addEventListener('input', e=>{
            const t=e.target;
            if(t.dataset.f){ const p=t.dataset.f.split(':'); const en=findE(p[0],p[1]); if(en){ en[p[2]]=t.value; saveConfig(); } }
            if(t.dataset.wb){ const p=t.dataset.wb.split(':'); wbSign[p[0]]=wbSign[p[0]]||{}; wbSign[p[0]][p[1]]=t.value; saveConfig(); }
            if(t.dataset.ex!=null){ extras[+t.dataset.ex]=t.value; saveConfig(); }
        });
        document.addEventListener('change', e=>{
            const t=e.target;
            if(t.dataset.f){ const p=t.dataset.f.split(':'); const en=findE(p[0],p[1]); if(en){ en[p[2]]=t.value; saveConfig(); } }
            if(t.dataset.on){ const p=t.dataset.on.split(':'); const en=findE(p[0],p[1]); if(en){ en.on=t.checked; saveConfig(); } }
            if(t.dataset.wbon){ const s=t.dataset.wbon; wbSign[s]=wbSign[s]||{}; wbSign[s].on=t.checked; saveConfig(); }
        });
        document.addEventListener('click', e=>{
            const head=e.target.closest('.acc-head');
            if(head){ const k=head.dataset.acc; openSet[k]=!openSet[k]; renderEditor(); return; }
            const t=e.target;
            if(t.dataset.add){ const p=t.dataset.add.split(':'); const a=arrOf(p[0]); if(a){ a.push(newEntry(p[0],p[1])); renderEditor(); saveConfig(); } }
            if(t.dataset.del){ const p=t.dataset.del.split(':'); const a=arrOf(p[0]); if(a){ const i=a.findIndex(x=>x.id===p[1]); if(i>=0){ a.splice(i,1); renderEditor(); saveConfig(); } } }
            if(t.dataset.delEx!=null){ extras.splice(+t.dataset.delEx,1); renderEditor(); saveConfig(); }
        });
        $('addExtra').onclick = ()=>{ extras.push(""); renderEditor(); saveConfig(); };
        $('publishBtn').onclick = publish;
        $('copyLink').onclick = ()=>{
            const url=location.origin+location.pathname;
            if(navigator.clipboard){ navigator.clipboard.writeText(url).then(()=>alert("已複製家長連結："+url),()=>prompt("家長連結：",url)); }
            else prompt("家長連結：",url);
        };
        $('editClassBtn').onclick = ()=>{
            const v=prompt('更新班級',className);
            if(v && v.trim()){ className=v.trim(); $('className').innerText=className; setDoc(bookRef,{className},{merge:true}); }
        };
        $('logoutBtn').onclick = ()=> signOut(auth);

        // 投影模式:按鈕或網址 #cast 切換;Esc 離開。藏掉編輯區與按鈕、字級放大、全螢幕置中。
        function fitCast(){
            const html=document.documentElement;
            if(!html.classList.contains('cast-mode')) return;
            const dr=document.querySelector('.date-row');
            const ul=document.querySelector('.items');
            const tray=document.querySelector('.chalk-tray');
            const frame=document.querySelector('.frame');
            if(!dr || !ul || !frame) return;
            const realN=Math.max(ul.querySelectorAll('li').length, 1);
            const refN=Math.max(realN, 7);   // always size as if there were at least 7 rows
            let size=120;
            html.style.setProperty('--castItem', size+'px');
            for(let i=0;i<70;i++){
                const topGap=parseFloat(getComputedStyle(frame).paddingTop)||0;
                const refItems=ul.offsetHeight*(refN/realN);
                const need=topGap + dr.offsetHeight + refItems + (tray?tray.offsetHeight:0) + 28;
                if(need <= window.innerHeight || size<=22) break;
                size-=4; html.style.setProperty('--castItem', size+'px');
            }
        }
        function setCast(on){
            document.documentElement.classList.toggle('cast-mode', on);
            if(on){ if(location.hash!=='#cast') history.replaceState(null,'','#cast'); requestAnimationFrame(fitCast); setTimeout(fitCast,350); }
            else if(location.hash==='#cast'){ history.replaceState(null,'',location.pathname+location.search); }
        }
        $('castBtn').onclick = ()=> setCast(true);
        $('castExit').onclick = ()=> setCast(false);
        document.addEventListener('keydown', e=>{ if(e.key==='Escape') setCast(false); });
        window.addEventListener('resize', ()=> requestAnimationFrame(fitCast));
        if(document.fonts && document.fonts.ready) document.fonts.ready.then(()=> requestAnimationFrame(fitCast));
        if(location.hash==='#cast') setCast(true);
    </script>
</body>
</html>
