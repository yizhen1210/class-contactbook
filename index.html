<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>班級聯絡簿</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#566850">
    <meta name="apple-mobile-web-app-title" content="班級聯絡簿">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="icon-180.png">
    <link rel="icon" type="image/png" href="icon-192.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Iansui&display=swap" rel="stylesheet">
    <style>
        :root {
            --board: #566850;
            --board-2: #607359;
            --chalk: #f2efe5;
            --chalk-dim: #c3cbb6;
            --circle: #41503b;
            --wood: #a3854f;
            --wood-dark: #7c6238;
            --p-year: #b15a43;
            --p-month: #c2904a;
            --p-day: #4e7d54;
            --del-color: #c4674f;
        }
        * { box-sizing: border-box; }
        html, body { margin: 0; padding: 0; }
        body {
            font-family: 'Iansui', sans-serif;
            background: #3a4634;
            color: var(--chalk);
            -webkit-font-smoothing: antialiased;
            min-height: 100vh;
        }
        .frame {
            max-width: 1100px;
            margin: 0 auto;
            min-height: 100vh;
            background: var(--board);
            background-image:
                radial-gradient(circle at 20% 30%, rgba(255,255,255,0.035), transparent 45%),
                radial-gradient(circle at 80% 70%, rgba(255,255,255,0.03), transparent 45%);
            border-left: 14px solid var(--wood);
            border-right: 14px solid var(--wood);
            box-shadow: inset 0 0 90px rgba(0,0,0,0.35);
            padding: 30px 34px 0;
            display: flex;
            flex-direction: column;
        }

        /* 標題 */
        .header { display: flex; align-items: center; justify-content: space-between; gap: 16px; flex-wrap: wrap; padding-bottom: 16px; border-bottom: 1px solid rgba(244,241,232,0.22); }
        .header h1 { margin: 0; font-size: 38px; color: var(--chalk); display: flex; align-items: center; gap: 12px; letter-spacing: 1px; }
        .header h1 .bag { user-select: none; -webkit-user-select: none; touch-action: manipulation; cursor: default; }
        .header h1 .num { color: #ffe6b0; }
        .edit-pencil { width: 44px; height: 44px; border-radius: 50%; border: 2px solid var(--chalk); background: transparent; color: var(--chalk); font-size: 22px; cursor: pointer; line-height: 1; padding: 0; }
        .edit-pencil:hover { background: rgba(244,241,232,0.15); }
        .logout-btn { background: transparent; color: var(--del-color); border: 2px solid var(--del-color); padding: 9px 22px; border-radius: 50px; cursor: pointer; font-family: inherit; font-size: 1.05em; white-space: nowrap; }
        .logout-btn:hover { background: var(--del-color); color: #fff; }

        /* 日期列 */
        .date-row { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; padding: 22px 2px 18px; }
        .date-row .num { font-size: 32px; color: var(--chalk); }
        .pill { color: #fff; font-size: 19px; padding: 3px 11px; border-radius: 7px; }
        .pill.y { background: var(--p-year); }
        .pill.m { background: var(--p-month); }
        .pill.d { background: var(--p-day); }
        .pill.w { background: var(--p-day); padding: 3px 14px; margin-left: 4px; }
        .date-stamp { margin-left: auto; color: var(--chalk-dim); font-size: 16px; }

        /* 聯絡事項 */
        .items { list-style: none; margin: 0; padding: 8px 2px 0; flex: 1; }
        .items li { display: flex; align-items: flex-start; gap: 18px; padding: 14px 2px; }
        .items .circle {
            flex: none; width: 40px; height: 40px; border-radius: 50%;
            background: var(--circle); color: var(--chalk);
            display: flex; align-items: center; justify-content: center; font-size: 20px;
            box-shadow: inset 0 0 0 1px rgba(244,241,232,0.2);
        }
        .items .txt { padding-top: 5px; color: var(--chalk); font-size: 26px; line-height: 1.4; letter-spacing: 0.5px; }
        .empty-note { color: var(--chalk-dim); font-size: 22px; padding: 40px 2px; text-align: center; }

        /* 粉筆槽 */
        .chalk-tray { margin: 20px -34px 0; height: 16px; background: var(--wood); border-top: 2px solid var(--wood-dark); position: relative; }
        .chalk-tray::before, .chalk-tray::after { content: ''; position: absolute; top: -6px; height: 7px; border-radius: 5px; }
        .chalk-tray::before { left: 12%; width: 60px; background: #f4f1e8; }
        .chalk-tray::after { left: calc(12% + 78px); width: 38px; background: #cdbfa6; }

        /* ===== 老師編輯區 ===== */
        .admin { background: var(--board-2); border: 1px solid rgba(244,241,232,0.25); border-radius: 14px; padding: 20px 22px; margin: 18px 0 4px; }
        .admin-title { color: #ffe6b0; font-size: 1.45em; margin: 0 0 4px; }
        .admin-sub { color: var(--chalk-dim); font-size: 0.95em; margin: 0 0 16px; }
        .subj-row { display: flex; align-items: center; gap: 14px; flex-wrap: wrap; padding: 12px 0; border-bottom: 1px solid rgba(244,241,232,0.14); }
        .subj-row .chk { display: flex; align-items: center; gap: 10px; min-width: 200px; }
        .subj-row .chk input[type=checkbox] { width: 20px; height: 20px; accent-color: var(--p-day); }
        .subj-row .name { font-size: 1.15em; color: var(--chalk); }
        .subj-row .tmpl { font-size: 0.85em; color: var(--chalk-dim); }
        .subj-row .fields { margin-left: auto; display: flex; gap: 12px; flex-wrap: wrap; }
        .field { display: inline-flex; align-items: center; gap: 6px; font-size: 0.95em; color: var(--chalk-dim); }
        .input { background: rgba(255,255,255,0.07); border: 1px solid rgba(244,241,232,0.4); border-radius: 10px; font-family: inherit; color: var(--chalk); }
        .field .input { width: 64px; height: 40px; text-align: center; font-size: 1.1em; }
        .input:focus { outline: none; border-color: var(--chalk); box-shadow: 0 0 0 3px rgba(244,241,232,0.18); }
        .input::placeholder { color: rgba(244,241,232,0.45); }
        .rowbtn { background: transparent; border: 1px solid var(--del-color); color: var(--del-color); border-radius: 8px; padding: 6px 12px; cursor: pointer; font-family: inherit; font-size: 0.95em; }
        .rowbtn:hover { background: var(--del-color); color: #fff; }

        .extra-row { display: flex; gap: 10px; margin-bottom: 10px; }
        .extra-row .input { flex: 1; height: 44px; padding: 0 16px; font-size: 1.05em; }
        .add-line { border: 1px dashed var(--chalk); background: transparent; color: var(--chalk); padding: 11px 16px; border-radius: 10px; font-family: inherit; font-size: 1.05em; width: 100%; cursor: pointer; }
        .add-line:hover { background: rgba(244,241,232,0.12); }

        .new-subj { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 14px; }
        .new-subj .input { height: 44px; padding: 0 16px; font-size: 1.02em; }
        .new-subj .n-name { width: 120px; }
        .new-subj .n-tmpl { flex: 1; min-width: 220px; }
        .new-subj button { height: 44px; border: none; background: var(--p-day); color: #fff; border-radius: 10px; padding: 0 22px; font-family: inherit; font-size: 1.05em; cursor: pointer; }
        .tip { font-size: 0.9em; color: var(--chalk-dim); margin: 12px 0 0; }
        .tip code { background: rgba(255,255,255,0.1); padding: 1px 7px; border-radius: 6px; }

        .publish-bar { display: flex; align-items: center; gap: 16px; flex-wrap: wrap; margin-top: 24px; }
        .btn-publish { background: var(--p-day); color: #fff; border: none; padding: 14px 34px; border-radius: 50px; cursor: pointer; font-family: inherit; font-size: 1.2em; }
        .btn-publish:hover { filter: brightness(1.08); }
        .btn-ghost { background: transparent; color: var(--chalk); border: 2px solid var(--chalk); padding: 12px 24px; border-radius: 50px; cursor: pointer; font-family: inherit; font-size: 1.02em; }
        .btn-ghost:hover { background: rgba(244,241,232,0.15); }
        .pub-stamp { color: var(--chalk-dim); font-size: 1em; }

        /* 署名 */
        .credit { text-align: center; color: var(--chalk-dim); font-size: 1.1em; letter-spacing: 0.5px; padding: 16px 0; }

        /* 登入框 */
        .hidden { display: none !important; }
        .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.45); align-items: center; justify-content: center; z-index: 1000; }
        .modal-content { background: var(--board-2); border: 2px solid var(--wood); padding: 36px 44px; border-radius: 20px; text-align: center; box-shadow: 0 20px 55px rgba(0,0,0,0.5); width: min(520px, 90vw); }
        .modal-title { font-size: 1.4em; color: var(--chalk); margin: 0 0 22px; }
        .modal-content input { display: block; width: 100%; margin: 0 0 24px; padding: 12px 18px; border: 2px solid var(--p-day); border-radius: 14px; font-family: inherit; font-size: 1.1em; outline: none; text-align: center; background: rgba(255,255,255,0.08); color: var(--chalk); }
        .modal-actions { display: flex; justify-content: center; gap: 18px; }
        .modal-actions button { padding: 11px 38px; border-radius: 50px; cursor: pointer; font-family: inherit; font-size: 1.15em; border: 2px solid var(--p-day); }
        .modal-actions .btn-ok { background: var(--p-day); color: #fff; }
        .modal-actions .btn-cancel { background: transparent; color: var(--chalk); }
        .modal-actions .btn-cancel:hover { background: rgba(244,241,232,0.12); }
        .switch-acct { background: none; border: none; color: var(--chalk-dim); font-family: inherit; font-size: 0.95em; text-decoration: underline; cursor: pointer; margin: -12px 0 18px; display: block; width: 100%; text-align: center; }
        .switch-acct:hover { color: var(--chalk); }

        /* 投影按鈕 */
        .cast-btn { background: transparent; color: var(--chalk); border: 2px solid var(--chalk); padding: 9px 20px; border-radius: 50px; cursor: pointer; font-family: inherit; font-size: 1.02em; white-space: nowrap; }
        .cast-btn:hover { background: rgba(244,241,232,0.15); }
        .cast-exit { display: none; position: fixed; top: 18px; right: 22px; z-index: 1100; width: 54px; height: 54px; border-radius: 50%; border: 2px solid var(--chalk); background: rgba(36,59,55,0.85); color: var(--chalk); font-size: 26px; cursor: pointer; }
        .cast-exit:hover { background: rgba(244,241,232,0.18); }

        /* ===== RWD:平板(641–1024) ===== */
        @media (min-width: 641px) and (max-width: 1024px) {
            .frame { max-width: 840px; padding: 28px 30px 0; }
            .header h1 { font-size: 34px; }
            .date-row .num { font-size: 30px; }
            .pill { font-size: 18px; }
            .items li { gap: 20px; padding: 16px 2px; }
            .items .circle { width: 46px; height: 46px; font-size: 22px; }
            .items .txt { font-size: 30px; }
        }

        /* ===== RWD:大尺寸電腦/螢幕(≥1280) ===== */
        @media (min-width: 1280px) {
            .header h1 { font-size: 42px; }
            .date-row .num { font-size: 36px; }
            .pill { font-size: 21px; }
            .items .circle { width: 44px; height: 44px; font-size: 22px; }
            .items .txt { font-size: 30px; }
        }

        /* ===== 投影模式(按鈕切換,不靠寬度) ===== */
        .cast-mode .frame { max-width: none; border-left-width: 18px; border-right-width: 18px; padding: 40px 64px 0; justify-content: center; }
        .cast-mode .admin, .cast-mode .logout-btn, .cast-mode .edit-pencil, .cast-mode .cast-btn, .cast-mode .credit { display: none !important; }
        .cast-mode .header { padding-bottom: 26px; }
        .cast-mode .header h1 { font-size: 60px; }
        .cast-mode .date-row { padding: 36px 2px 30px; gap: 14px; }
        .cast-mode .date-row .num { font-size: 54px; }
        .cast-mode .pill { font-size: 30px; padding: 5px 16px; border-radius: 9px; }
        .cast-mode .pill.w { padding: 5px 20px; }
        .cast-mode .date-stamp { font-size: 22px; }
        .cast-mode .items { padding-top: 14px; }
        .cast-mode .items li { padding: 22px 2px; gap: 30px; }
        .cast-mode .items .circle { width: 70px; height: 70px; font-size: 34px; }
        .cast-mode .items .txt { font-size: 54px; padding-top: 9px; }
        .cast-mode .chalk-tray { margin-top: 34px; height: 22px; }
        .cast-mode .cast-exit { display: flex; align-items: center; justify-content: center; }

        /* ===== RWD:手機(≤640) ===== */
        @media (max-width: 640px) {
            .frame { border-left-width: 8px; border-right-width: 8px; padding: 20px 18px 0; }
            .header h1 { font-size: 30px; }
            .edit-pencil { width: 36px; height: 36px; font-size: 18px; }
            .date-row { gap: 8px; padding: 16px 0 12px; }
            .date-row .num { font-size: 26px; }
            .pill { font-size: 16px; }
            .date-stamp { width: 100%; margin-left: 0; }
            .items li { gap: 13px; }
            .items .circle { width: 34px; height: 34px; font-size: 17px; }
            .items .txt { font-size: 21px; }
            .chalk-tray { margin-left: -18px; margin-right: -18px; }
            .subj-row .fields { margin-left: 0; width: 100%; }
            .new-subj { flex-direction: column; align-items: stretch; }
            .new-subj .input, .new-subj button { width: 100%; }
            .publish-bar { flex-direction: column; align-items: stretch; }
            .btn-publish, .btn-ghost { width: 100%; }
            .modal-content { padding: 26px 22px; width: min(420px, 88vw); }
        }
    </style>
</head>
<body>
  <div class="frame">
    <div class="header">
        <h1><span class="bag">🍎</span><span class="num" id="className">508</span><button id="editClassBtn" class="edit-pencil admin-only hidden" title="更新班級">✏️</button><span>班級聯絡簿</span></h1>
        <span style="display:flex; gap:12px; align-items:center;">
            <button id="castBtn" class="cast-btn">投影模式</button>
            <button id="logoutBtn" class="logout-btn admin-only hidden">登出</button>
        </span>
    </div>
    <button id="castExit" class="cast-exit" title="離開投影模式">✕</button>

    <!-- 老師編輯區 -->
    <div id="adminArea" class="admin admin-only hidden">
        <h2 class="admin-title">各科固定作業</h2>
        <p class="admin-sub">勾選今天有的科目，只填課數、頁數</p>
        <div id="subjList"></div>
        <div class="new-subj">
            <input class="input n-name" id="nName" placeholder="科目，如 國語">
            <input class="input n-tmpl" id="nTmpl" placeholder="格式，如 習作第 {課} 課、甲本 {頁} 頁">
            <button id="addSubj">新增科目</button>
        </div>
        <p class="tip">用大括號標要填的數字，例如 <code>{課}</code>、<code>{頁}</code>，括號裡的字會變成輸入欄的名稱。</p>

        <h2 class="admin-title" style="margin-top:24px;">其他事項</h2>
        <p class="admin-sub">臨時、非固定的項目，如帶物品、簽名</p>
        <div id="extraList"></div>
        <button class="add-line" id="addExtra">＋ 新增一項</button>

        <div class="publish-bar">
            <button class="btn-publish" id="publishBtn">發布今日聯絡簿</button>
            <button class="btn-ghost" id="copyLink">複製家長連結</button>
            <span class="pub-stamp" id="pubStamp"></span>
        </div>
    </div>

    <!-- 日期 -->
    <div class="date-row" id="dateRow"></div>

    <!-- 今日聯絡事項 -->
    <ul class="items" id="itemList"></ul>

    <div class="chalk-tray"></div>
    <footer class="credit">created by 怡臻老師</footer>
  </div>

    <div id="inputModal" class="modal-overlay">
        <div class="modal-content">
            <p class="modal-title">請輸入老師專屬密碼才能編輯：</p>
            <input type="password" id="passInput" placeholder="密碼" autocomplete="current-password">
            <div class="modal-actions">
                <button class="btn-ok" onclick="checkPass()">確定</button>
                <button class="btn-cancel" onclick="closeModal()">取消</button>
            </div>
        </div>
    </div>

    <script>
        if (localStorage.getItem('teacherHint') === '1') {
            document.addEventListener('DOMContentLoaded', () => {
                document.documentElement.classList.add('teacher-mode');
                document.querySelectorAll('.admin-only').forEach(e => e.classList.remove('hidden'));
            });
        }
    </script>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, onSnapshot, setDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // 聯絡簿專用的 Firebase 專案(class-contactbook)。資料存在 config/contactBook。
        const firebaseConfig = { apiKey: "AIzaSyAiT81oV4A-JUmtvNZHNIaN0Vjbf9H0jMo", authDomain: "class-contactbook.firebaseapp.com", projectId: "class-contactbook", storageBucket: "class-contactbook.firebasestorage.app", messagingSenderId: "775848726685", appId: "1:775848726685:web:b0dcdcdb680ad9fff78474" };
        const db = getFirestore(initializeApp(firebaseConfig));
        const auth = getAuth();
        // 帳號只會由你在 Firebase 主控台建立,因此任何成功登入者都視為老師(寫入權限另由 Firestore 規則的 email 清單把關)
        const $ = (id) => document.getElementById(id);
        const bookRef = doc(db, 'config', 'contactBook');

        const WEEKDAYS = ["日","一","二","三","四","五","六"];
        const DEFAULT_SUBJECTS = [
            {id:"chi", name:"國語", tmpl:"習作第 {課} 課、甲本第 {頁} 頁", enabled:true,  vals:{"課":14,"頁":8}},
            {id:"mat", name:"數學", tmpl:"課本 p.{頁}、習作 p.{習作}",      enabled:true,  vals:{"頁":52,"習作":30}},
            {id:"eng", name:"英語", tmpl:"唸讀 Unit {課}",                 enabled:true,  vals:{"課":5}},
            {id:"sci", name:"自然", tmpl:"習作第 {頁} 頁",                 enabled:false, vals:{"頁":12}},
            {id:"soc", name:"社會", tmpl:"課本第 {頁} 頁",                 enabled:false, vals:{"頁":20}}
        ];
        const DEFAULT_EXTRAS = ["帶大袋子","受試者同意書簽名"];

        let isTeacher = false;
        let editorReady = false;
        let subjects = JSON.parse(JSON.stringify(DEFAULT_SUBJECTS));
        let extras = DEFAULT_EXTRAS.slice();
        let className = "508";

        function fieldsOf(tmpl){ const out=[],seen={}; let m; const re=/\{([^}]+)\}/g; while((m=re.exec(tmpl))){ if(!seen[m[1]]){seen[m[1]]=1;out.push(m[1]);} } return out; }
        function fillTmpl(tmpl,vals){ return tmpl.replace(/\{([^}]+)\}/g,(_,n)=>{ const v=vals[n]; return (v===""||v==null)?"＿":v; }); }
        function buildItems(){
            const arr = subjects.filter(s=>s.enabled).map(s=> s.name+"："+fillTmpl(s.tmpl,s.vals));
            extras.forEach(t=>{ if(t&&t.trim()) arr.push(t.trim()); });
            return arr;
        }
        function rocParts(){ const n=new Date(); return {y:n.getFullYear()-1911,m:n.getMonth()+1,d:n.getDate(),w:WEEKDAYS[n.getDay()]}; }
        function esc(s){ return String(s).replace(/[&<>]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;"}[c])); }

        function renderPublished(pub){
            const dp = (pub && pub.date) ? pub.date : rocParts();
            $('dateRow').innerHTML = `<span class="num">${dp.y}</span><span class="pill y">年</span>`
                + `<span class="num">${dp.m}</span><span class="pill m">月</span>`
                + `<span class="num">${dp.d}</span><span class="pill d">日</span>`
                + `<span class="pill w">星期${dp.w}</span>`
                + ((pub && pub.label) ? `<span class="date-stamp">更新於 ${esc(pub.label)}</span>` : '');

            const items = (pub && pub.items) ? pub.items : [];
            if(!items.length){ $('itemList').innerHTML = `<li class="empty-note">今天還沒有發布聯絡簿</li>`; }
            else { $('itemList').innerHTML = items.map((t,i)=> `<li><span class="circle">${i+1}</span><span class="txt">${esc(t)}</span></li>`).join(''); }
        }

        function renderEditor(){
            $('subjList').innerHTML = subjects.map(s=>{
                const fields = fieldsOf(s.tmpl).map(f=>{
                    const v = s.vals[f]==null?"":s.vals[f];
                    return `<span class="field">${esc(f)}<input type="number" class="input" min="0" step="1" value="${esc(v)}" data-sid="${s.id}" data-f="${esc(f)}"></span>`;
                }).join('');
                return `<div class="subj-row"><label class="chk"><input type="checkbox" data-sid="${s.id}" data-toggle="1" ${s.enabled?'checked':''}>`
                    + `<span><span class="name">${esc(s.name)}</span><br><span class="tmpl">${esc(s.tmpl)}</span></span></label>`
                    + `<span class="fields">${fields}<button class="rowbtn" data-del-subj="${s.id}">刪除</button></span></div>`;
            }).join('');
            $('extraList').innerHTML = extras.map((t,i)=>
                `<div class="extra-row"><input class="input" value="${esc(t)}" data-ex="${i}" placeholder="輸入事項，如 帶大袋子"><button class="rowbtn" data-del-ex="${i}">刪除</button></div>`
            ).join('');
        }

        let saveTimer = null;
        function saveConfig(){ clearTimeout(saveTimer); saveTimer=setTimeout(()=>{ setDoc(bookRef,{subjects,extras,className},{merge:true}).catch(e=>console.warn(e)); },700); }
        async function publish(){
            const dp = rocParts(); const now = new Date();
            const label = `${dp.y}/${dp.m}/${dp.d} ${now.getHours()}:${("0"+now.getMinutes()).slice(-2)}`;
            try{ await setDoc(bookRef,{subjects,extras,className,published:{items:buildItems(),date:dp,label}},{merge:true}); $('pubStamp').textContent="已發布 · "+label; }
            catch(e){ alert("發布失敗，請確認已登入且 Firestore 規則允許寫入"); console.warn(e); }
        }

        onSnapshot(bookRef, (snap)=>{
            const data = snap.exists() ? snap.data() : null;
            if(data){
                if(data.className){ className=data.className; $('className').innerText=className; }
                renderPublished(data.published || null);
                if(isTeacher && !editorReady){
                    if(Array.isArray(data.subjects) && data.subjects.length) subjects=data.subjects;
                    if(Array.isArray(data.extras)) extras=data.extras;
                    editorReady=true; renderEditor();
                }
            } else { renderPublished(null); }
        }, err=>{ console.warn(err); renderPublished(null); });

        // 兩位老師共用同一組編輯帳號:email 寫死在這裡,老師只需輸入密碼。把下面換成你那組共用編輯帳號的 email。
        const SHARED_EMAIL = "annychen1210@gmail.com";
        window.checkPass = async () => {
            const pw=$('passInput').value; if(!pw) return;
            try{ await signInWithEmailAndPassword(auth,SHARED_EMAIL,pw); window.closeModal(); }
            catch(err){ alert("密碼錯誤"); $('passInput').value=''; $('passInput').focus(); }
        };
        window.closeModal = () => { $('inputModal').style.display='none'; $('passInput').value=''; };
        window.openLogin = () => { $('passInput').value=''; $('inputModal').style.display='flex'; setTimeout(()=>$('passInput').focus(),50); };

        let bagTaps=0, bagTimer=null;
        document.querySelector('.bag').addEventListener('click', ()=>{
            bagTaps++; clearTimeout(bagTimer); bagTimer=setTimeout(()=>{bagTaps=0;},600);
            if(bagTaps>=3){ bagTaps=0; clearTimeout(bagTimer);
                if(isTeacher){ signOut(auth); } else { window.openLogin(); }
            }
        });
        $('passInput').addEventListener('keydown', e=>{ if(e.key==='Enter') window.checkPass(); });

        function applyTeacherUI(){
            if(isTeacher){
                localStorage.setItem('teacherHint','1');
                document.documentElement.classList.add('teacher-mode');
                document.querySelectorAll('.admin-only').forEach(e=>e.classList.remove('hidden'));
                if(!editorReady) renderEditor();
            } else {
                localStorage.removeItem('teacherHint');
                document.documentElement.classList.remove('teacher-mode');
                document.querySelectorAll('.admin-only').forEach(e=>e.classList.add('hidden'));
            }
        }
        onAuthStateChanged(auth, (user)=>{ isTeacher=!!user; applyTeacherUI(); });

        document.addEventListener('input', e=>{
            const t=e.target;
            if(t.dataset.sid && t.dataset.f!=null){ const s=subjects.find(x=>x.id===t.dataset.sid); if(s){ s.vals[t.dataset.f]=t.value; saveConfig(); } }
            if(t.dataset.ex!=null){ extras[+t.dataset.ex]=t.value; saveConfig(); }
        });
        document.addEventListener('change', e=>{
            const t=e.target;
            if(t.dataset.sid && t.dataset.toggle){ const s=subjects.find(x=>x.id===t.dataset.sid); if(s){ s.enabled=t.checked; saveConfig(); } }
        });
        document.addEventListener('click', e=>{
            const t=e.target;
            if(t.dataset.delSubj){ subjects=subjects.filter(x=>x.id!==t.dataset.delSubj); renderEditor(); saveConfig(); }
            if(t.dataset.delEx!=null){ extras.splice(+t.dataset.delEx,1); renderEditor(); saveConfig(); }
        });
        $('addSubj').onclick = ()=>{
            const name=$('nName').value.trim(), tmpl=$('nTmpl').value.trim();
            if(!name||!tmpl){ alert("請填科目與格式"); return; }
            const vals={}; fieldsOf(tmpl).forEach(f=>vals[f]="");
            subjects.push({id:"s"+Date.now(),name,tmpl,enabled:true,vals});
            $('nName').value=''; $('nTmpl').value=''; renderEditor(); saveConfig();
        };
        $('addExtra').onclick = ()=>{ extras.push(""); renderEditor(); saveConfig(); };
        $('publishBtn').onclick = publish;
        $('copyLink').onclick = ()=>{
            const url=location.origin+location.pathname;
            if(navigator.clipboard){ navigator.clipboard.writeText(url).then(()=>alert("已複製家長連結："+url),()=>prompt("家長連結：",url)); }
            else prompt("家長連結：",url);
        };
        $('editClassBtn').onclick = ()=>{
            const v=prompt('更新班級',className);
            if(v && v.trim()){ className=v.trim(); $('className').innerText=className; setDoc(bookRef,{className},{merge:true}); }
        };
        $('logoutBtn').onclick = ()=> signOut(auth);

        // 投影模式:按鈕或網址 #cast 切換;Esc 離開。藏掉編輯區與按鈕、字級放大、全螢幕置中。
        function setCast(on){
            document.documentElement.classList.toggle('cast-mode', on);
            if(on){ if(location.hash!=='#cast') history.replaceState(null,'','#cast'); }
            else if(location.hash==='#cast'){ history.replaceState(null,'',location.pathname+location.search); }
        }
        $('castBtn').onclick = ()=> setCast(true);
        $('castExit').onclick = ()=> setCast(false);
        document.addEventListener('keydown', e=>{ if(e.key==='Escape') setCast(false); });
        if(location.hash==='#cast') setCast(true);
    </script>
</body>
</html>
