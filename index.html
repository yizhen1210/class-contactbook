<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>班級聯絡簿</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#587069">
    <meta name="apple-mobile-web-app-title" content="班級聯絡簿">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="icon-180.png">
    <link rel="icon" type="image/png" href="icon-192.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Iansui&display=swap" rel="stylesheet">
    <style>
        :root {
            --board: #587069;
            --board-2: #647e78;
            --chalk: #f3f1ea;
            --chalk-dim: #cdd3cb;
            --circle: #42544d;
            --wood: #93826b;
            --wood-dark: #756950;
            --p-day: #05798e;
            --del-color: #c4674f;
        }
        * { box-sizing: border-box; }
        html, body { margin: 0; padding: 0; }
        body {
            font-family: 'Iansui', sans-serif;
            background: #e8e8e2;
            color: var(--chalk);
            -webkit-font-smoothing: antialiased;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        .frame {
            --pad: 120px;
            width: 100%;
            max-width: 1100px;
            margin: 0 auto;
            flex: 1 0 auto;
            background: var(--board);
            background-image:
                radial-gradient(circle at 20% 30%, rgba(255,255,255,0.035), transparent 45%),
                radial-gradient(circle at 80% 70%, rgba(255,255,255,0.03), transparent 45%);
            border-left: 26px solid var(--wood);
            border-right: 26px solid var(--wood);
            box-shadow: inset 0 0 90px rgba(0,0,0,0.35);
            padding: 20px var(--pad) 0;
            display: flex;
            flex-direction: column;
        }

        /* 標題 */
        .header { display: flex; align-items: center; justify-content: space-between; gap: 16px; flex-wrap: wrap; padding-bottom: 16px; border-bottom: 1px solid rgba(244,241,232,0.22); }
        .header h1 { margin: 0; font-size: 44px; color: var(--chalk); display: flex; align-items: center; gap: 12px; letter-spacing: 1px; }
        .header h1 .bag { user-select: none; -webkit-user-select: none; touch-action: manipulation; cursor: default; }
        .header h1 .num { color: #ffe6b0; }
        .edit-pencil { width: 44px; height: 44px; border-radius: 50%; border: 2px solid var(--chalk); background: transparent; color: var(--chalk); font-size: 22px; cursor: pointer; line-height: 1; padding: 0; }
        .edit-pencil:hover { background: rgba(244,241,232,0.15); }
        .logout-btn { background: transparent; color: #ffb59e; border: 2px solid #ff7a5c; padding: 9px 22px; border-radius: 50px; cursor: pointer; font-family: inherit; font-size: 1.05em; white-space: nowrap; }
        .logout-btn:hover { background: #ff7a5c; color: #fff; }

        /* 日期列 */
        .date-row { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; padding: 12px 2px 16px; font-size: 38px; }
        .dateline { display: inline-flex; align-items: center; gap: 12px; flex-wrap: wrap; }
        .date-row .num { color: #fff; font-weight: bold; -webkit-text-stroke: 0.5px #fff; }
        .tag { font-size: 1em; line-height: 1; background: #f1f0e9; border: 2px solid; font-weight: bold; -webkit-text-stroke: 0.5px currentColor; }
        .tag.y, .tag.m, .tag.d { display: inline-flex; align-items: center; justify-content: center; width: 1.5em; height: 1.5em; border-radius: 50%; }
        .tag.y { color: #bb482f; border-color: #bb482f; padding-bottom: 0.05em; }
        .tag.m { color: #c57249; border-color: #c57249; padding-bottom: 0.12em; }
        .tag.d { color: #8f7a60; border-color: #8f7a60; padding-bottom: 0.12em; }
        .tag.wk { color: #05798c; border-color: #05798c; border-radius: 0.42em; height: 1.5em; padding: 0 0.2em; display: inline-flex; align-items: center; }
        .wkwrap { display: inline-flex; align-items: center; gap: 3px; margin-left: 4px; }
        .wd { color: #fff; font-weight: bold; -webkit-text-stroke: 0.5px #fff; }
        .date-stamp { margin-left: auto; color: var(--chalk-dim); font-size: 16px; }

        /* 聯絡事項 */
        .items { list-style: none; margin: 0; padding: 8px 2px 0; }
        .items li { display: flex; align-items: center; gap: 20px; padding: 16px 2px; }
        .items .circle {
            flex: none; width: 50px; height: 50px; border-radius: 50%;
            background: var(--circle); color: #fff;
            display: flex; align-items: center; justify-content: center; font-size: 30px; font-weight: bold;
        }
        .items .txt { color: #fff; font-size: 31px; line-height: 1.4; letter-spacing: 0.5px; }
        .items .txt.hl { color: #ffde59; }
        .empty-note { color: var(--chalk-dim); font-size: 26px; padding: 40px 2px; text-align: center; }

        /* 粉筆槽 */
        .chalk-tray { margin: 20px calc(-1 * var(--pad)) 0; margin-top: auto; height: 22px; background: var(--wood); border-top: 2px solid var(--wood-dark); position: relative; }
        .chalk-tray::before, .chalk-tray::after { content: ''; position: absolute; top: -6px; height: 7px; border-radius: 5px; }
        .chalk-tray::before { left: 12%; width: 60px; background: #f4f1e8; }
        .chalk-tray::after { left: calc(12% + 78px); width: 38px; background: #c4bdac; }

        /* ===== 老師編輯區 ===== */
        .admin { background: var(--board-2); border: 1px solid rgba(244,241,232,0.25); border-radius: 14px; padding: 20px 22px; margin: 18px 0 4px; }
        .admin-title { color: #ffe6b0; font-size: 1.45em; margin: 0 0 4px; }
        .admin-sub { color: var(--chalk-dim); font-size: 0.95em; margin: 0 0 16px; }
        .hw-row { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; padding: 8px 0; border-bottom: 1px solid rgba(244,241,232,0.12); }
        .hw-on { width: 24px; height: 24px; accent-color: var(--p-day); flex: none; cursor: pointer; }
        .hw-subj { height: 42px; border-radius: 10px; background: rgba(255,255,255,0.07); border: 1px solid rgba(244,241,232,0.4); color: var(--chalk); font-family: inherit; font-size: 1em; padding: 0 8px; cursor: pointer; }
        .hw-subj option { color: #233; }
        .hw-field { display: inline-flex; align-items: center; gap: 6px; font-size: 1em; color: var(--chalk-dim); }
        .add-line-btn { border: 1px dashed var(--chalk); background: transparent; color: var(--chalk); padding: 9px 16px; border-radius: 10px; font-family: inherit; font-size: 1em; cursor: pointer; }
        .add-line-btn:hover { background: rgba(244,241,232,0.12); }
        .acc { border-bottom: 1px solid rgba(244,241,232,0.12); }
        .acc-head { display: flex; align-items: center; gap: 10px; padding: 13px 2px; cursor: pointer; user-select: none; }
        .acc-arrow { color: var(--chalk-dim); width: 16px; text-align: center; }
        .acc-name { font-size: 1.2em; color: var(--chalk); }
        .acc-badge { background: var(--p-day); color: #fff; font-size: 0.78em; min-width: 22px; height: 22px; border-radius: 11px; display: inline-flex; align-items: center; justify-content: center; padding: 0 6px; }
        .acc-body { padding: 0 0 12px 26px; }
        .acc-body:empty { display: none; }
        .sec-title { display: flex; align-items: center; gap: 10px; margin: 24px 0 6px; font-size: 1.45em; color: #ffe6b0; cursor: pointer; user-select: none; font-weight: bold; }
        .hw-static { color: var(--chalk); font-size: 1.05em; }
        .input { background: rgba(255,255,255,0.07); border: 1px solid rgba(244,241,232,0.4); border-radius: 10px; font-family: inherit; color: var(--chalk); }
        .input:focus { outline: none; border-color: var(--chalk); box-shadow: 0 0 0 3px rgba(244,241,232,0.18); }
        .input::placeholder { color: rgba(244,241,232,0.45); }
        .iconbtn { background: transparent; border: none; padding: 6px; margin-left: 2px; cursor: pointer; display: inline-flex; align-items: center; justify-content: center; border-radius: 8px; line-height: 0; }
        .iconbtn:hover { background: rgba(255,255,255,0.16); }
        .iconbtn.clear { color: #ffcf70; }
        .iconbtn.del { color: #ff7a5c; }

        .extra-row { display: flex; gap: 10px; margin-bottom: 10px; align-items: center; }
        .extra-row .input { flex: 1 1 auto; min-width: 0; height: 44px; padding: 0 16px; font-size: 1.05em; }
        .extra-row .iconbtn { flex: none; }
        .add-line { border: 1px dashed var(--chalk); background: transparent; color: var(--chalk); padding: 11px 16px; border-radius: 10px; font-family: inherit; font-size: 1.05em; width: 100%; cursor: pointer; }
        .add-line:hover { background: rgba(244,241,232,0.12); }

        .input.hw-type { flex: 1 1 180px; min-width: 140px; height: 42px; padding: 0 14px; font-size: 1.02em; }
        .input.hw-num { width: 58px; height: 42px; text-align: center; font-size: 1.05em; padding: 0; }

        .publish-bar { display: flex; align-items: center; gap: 16px; flex-wrap: wrap; margin-top: 24px; }
        .btn-publish { background: var(--p-day); color: #fff; border: none; padding: 14px 34px; border-radius: 50px; cursor: pointer; font-family: inherit; font-size: 1.2em; }
        .btn-publish:hover { filter: brightness(1.08); }
        .btn-ghost { background: transparent; color: var(--chalk); border: 2px solid var(--chalk); padding: 12px 24px; border-radius: 50px; cursor: pointer; font-family: inherit; font-size: 1.02em; }
        .btn-ghost:hover { background: rgba(244,241,232,0.15); }
        .pub-stamp { color: var(--chalk-dim); font-size: 1em; }

        /* 署名 */
        .credit { text-align: center; color: #8a8d84; font-size: 15px; letter-spacing: 0.5px; padding: 14px 0 22px; }

        /* 登入框 */
        .hidden { display: none !important; }
        body:not(.ready) #className,
        body:not(.ready) #dateRow,
        body:not(.ready) #itemList { visibility: hidden; }
        .modal { position: fixed; inset: 0; display: none; align-items: center; justify-content: center; background: rgba(10,14,11,.6); z-index: 1100; padding: 20px; }
        .modal.show { display: flex; }
        .modal-box { background: #fff; color: #3f514a; border-radius: 16px; padding: 22px 22px 16px; max-width: 360px; width: 100%; box-shadow: 0 20px 55px rgba(0,0,0,.4); border-top: 4px solid var(--wood); }
        .modal-msg { margin: 0 0 18px; font-size: 17px; line-height: 1.6; }
        .modal-act { display: flex; gap: 10px; justify-content: flex-end; }
        .modal-act button { font-family: inherit; cursor: pointer; border-radius: 50px; padding: 9px 26px; font-size: 16px; border: none; }
        .m-no { background: transparent; border: 1px solid #c7bca0; color: #5a6660; }
        .m-ok { background: var(--del-color); color: #fff; }
        .modal-input { display: block; width: 100%; margin: 0 0 18px; padding: 11px 16px; border: 2px solid var(--p-day); border-radius: 12px; font-family: inherit; font-size: 16px; outline: none; background: #fff; color: #2e3a35; box-sizing: border-box; }
        .modal-input:focus { box-shadow: 0 0 10px 2px rgba(5,121,140,0.35); }
        .m-ok:active, .m-no:active { transform: translateY(1px); }
        .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.45); align-items: center; justify-content: center; z-index: 1000; }
        .modal-content { background: #fff; border: 3px solid var(--p-day); padding: 36px 44px; border-radius: 20px; text-align: center; box-shadow: 0 20px 55px rgba(0,0,0,0.4), 0 0 50px 8px rgba(5,121,142,0.13); width: min(520px, 90vw); }
        .modal-title { font-size: 1.4em; color: #3f514a; margin: 0 0 22px; }
        .modal-content input { display: block; width: 100%; margin: 0 0 24px; padding: 12px 18px; border: 2px solid var(--chalk-dim); border-radius: 14px; font-family: inherit; font-size: 1.1em; outline: none; text-align: center; background: #fff; color: #2e3a35; }
        .modal-content input:focus { border-color: var(--p-day); box-shadow: 0 0 12px 3px rgba(5,121,142,0.5); }
        .modal-content input::placeholder { color: #cdd3cb; }
        .modal-actions { display: flex; justify-content: center; gap: 18px; }
        .modal-actions button { padding: 11px 38px; border-radius: 50px; cursor: pointer; font-family: inherit; font-size: 1.15em; border: 2px solid var(--p-day); }
        .modal-actions .btn-ok { background: var(--p-day); color: #fff; }
        .modal-actions .btn-ok:hover { background: #04697c; }
        .modal-actions .btn-cancel { background: rgba(5,121,142,0.10); color: var(--p-day); border-color: var(--p-day); }
        .modal-actions .btn-cancel:hover { background: var(--p-day); color: #fff; }

        /* 投影按鈕 */
        .cast-btn { background: transparent; color: var(--chalk); border: 2px solid var(--chalk); padding: 9px 20px; border-radius: 50px; cursor: pointer; font-family: inherit; font-size: 1.02em; white-space: nowrap; }
        .cast-btn:hover { background: rgba(244,241,232,0.15); }
        .cast-exit { display: none; position: fixed; top: 18px; right: 22px; z-index: 1100; width: 54px; height: 54px; border-radius: 50%; border: 2px solid var(--chalk); background: rgba(36,59,55,0.85); color: var(--chalk); font-size: 26px; cursor: pointer; }
        .cast-exit:hover { background: rgba(244,241,232,0.18); }

        /* ===== RWD:平板(641–1024) ===== */
        @media (min-width: 641px) and (max-width: 1024px) {
            .frame { max-width: 840px; --pad: 44px; }
            .header h1 { font-size: 38px; }
            .date-row { font-size: 34px; }
            .items li { gap: 20px; padding: 16px 2px; }
            .items .circle { width: 50px; height: 50px; font-size: 30px; }
            .items .txt { font-size: 30px; }
        }

        /* ===== RWD:大尺寸電腦/螢幕(≥1280) ===== */
        @media (min-width: 1280px) {
            .header h1 { font-size: 48px; }
            .date-row { font-size: 42px; }
            .items .circle { width: 54px; height: 54px; font-size: 32px; }
            .items .txt { font-size: 34px; }
        }

        /* ===== 投影模式(按鈕切換,不靠寬度) ===== */
        .cast-mode .frame { max-width: none; min-height: 100vh; border-left-width: 30px; border-right-width: 30px; padding: 6vh var(--pad) 0; justify-content: flex-start; }
        .cast-mode .admin, .cast-mode .logout-btn, .cast-mode .edit-pencil, .cast-mode .cast-btn, .cast-mode .credit, .cast-mode .header { display: none !important; }
        .cast-mode .date-row { padding: 0 2px 22px; gap: calc(var(--castItem, 54px) * 0.3); font-size: var(--castItem, 54px); }
        .cast-mode .date-stamp { font-size: 0.42em; }
        .cast-mode .items { padding-top: 6px; flex: 0 0 auto; }
        .cast-mode .items li { padding: calc(var(--castItem, 54px) * 0.18) 2px; gap: calc(var(--castItem, 54px) * 0.42); }
        .cast-mode .items .circle { width: calc(var(--castItem, 54px) * 1.4); height: calc(var(--castItem, 54px) * 1.4); font-size: var(--castItem, 54px); }
        .cast-mode .items .txt { font-size: var(--castItem, 54px); }
        .cast-mode .chalk-tray { margin-top: auto; height: 24px; }
        .cast-mode .cast-exit { display: flex; align-items: center; justify-content: center; }

        /* ===== RWD:手機(≤640) ===== */
        @media (max-width: 640px) {
            .frame { --pad: 18px; border-left-width: 12px; border-right-width: 12px; }
            .cast-btn { display: none; }
            .header { justify-content: center; }
            .header h1 { font-size: 30px; }
            .edit-pencil { width: 36px; height: 36px; font-size: 18px; }
            .date-row { gap: 6px; padding: 14px 0 12px; font-size: min(24px, calc((100vw - 60px) / 13)); flex-wrap: nowrap; justify-content: center; }
            .dateline { flex-wrap: nowrap; gap: 5px; white-space: nowrap; }
            .date-stamp { display: none; }
            .items { padding-top: 4px; }
            .items li { gap: 13px; padding: 7px 2px; }
            .items .circle { width: 38px; height: 38px; font-size: 21px; }
            .items .txt { font-size: 21px; }
            .chalk-tray { height: 16px; }
            .credit { padding: 10px 0 14px; }
            .input.hw-type { flex: 1 1 100%; }
            .publish-bar { flex-direction: column; align-items: stretch; }
            .btn-publish, .btn-ghost { width: 100%; }
            .modal-content { padding: 26px 22px; width: min(420px, 88vw); }
            .modal-title { font-size: min(1.3em, calc((88vw - 56px) / 15)); margin-bottom: 18px; white-space: nowrap; }
        }
    </style>
</head>
<body>
  <div class="frame">
    <div class="header">
        <h1><span class="bag">🍎</span><span class="num" id="className"></span><button id="editClassBtn" class="edit-pencil admin-only hidden" title="更新班級">✏️</button><span>班級聯絡簿</span></h1>
        <span style="display:flex; gap:12px; align-items:center;">
            <button id="castBtn" class="cast-btn">投影模式</button>
            <button id="logoutBtn" class="logout-btn admin-only hidden">登出</button>
        </span>
    </div>
    <button id="castExit" class="cast-exit" title="離開投影模式">✕</button>

    <!-- 老師編輯區 -->
    <div id="adminArea" class="admin admin-only hidden">
        <button class="add-line" id="clearAll" style="margin-bottom:14px;">↺ 清除全部勾選（開始新的一天）</button>
        <h2 class="admin-title">書寫作業</h2>
        <p class="admin-sub">點科目展開；國語為固定選項，其餘科目可自行新增。勾選的才會列入聯絡簿</p>
        <div id="hwList"></div>

        <div id="wbHead"></div>
        <div id="wbList"></div>

        <div id="rvHead"></div>
        <div id="reviewList"></div>

        <div id="exHead"></div>
        <div id="examWrap"><div id="examTiming" style="margin:6px 0 10px;"></div><div id="examList"></div></div>

        <h2 class="admin-title" style="margin-top:24px;">其他事項</h2>
        <p class="admin-sub">臨時、非固定的項目，如帶物品</p>
        <div id="extraList"></div>
        <button class="add-line" id="addExtra">＋ 新增一項</button>

        <div class="publish-bar">
            <button class="btn-publish" id="publishBtn">發布今日聯絡簿</button>
            <button class="btn-ghost" id="copyLink">複製家長連結</button>
            <span class="pub-stamp" id="pubStamp"></span>
        </div>
    </div>

    <!-- 日期 -->
    <div class="date-row" id="dateRow"></div>

    <!-- 今日聯絡事項 -->
    <ul class="items" id="itemList"></ul>

    <div class="chalk-tray"></div>
  </div>
  <footer class="credit">created by 怡臻老師</footer>

    <div id="inputModal" class="modal-overlay">
        <div class="modal-content">
            <p class="modal-title">請輸入老師專屬密碼才能編輯：</p>
            <input type="password" id="passInput" placeholder="密碼" autocomplete="off">
            <p id="imeHint" style="display:none; margin:-14px 0 18px; font-size:0.9em; color:var(--del-color);">偵測到中文輸入法，密碼請切換為英數</p>
            <div class="modal-actions">
                <button class="btn-ok" onclick="checkPass()">確定</button>
                <button class="btn-cancel" onclick="closeModal()">取消</button>
            </div>
        </div>
    </div>

    <div class="modal" id="modal">
        <div class="modal-box">
            <p class="modal-msg" id="modal-msg"></p>
            <input type="text" class="modal-input" id="modal-input" style="display:none;">
            <div class="modal-act">
                <button class="m-no" id="modal-no">取消</button>
                <button class="m-ok" id="modal-ok">確定</button>
            </div>
        </div>
    </div>

    <script>
        if (localStorage.getItem('teacherHint') === '1') {
            document.addEventListener('DOMContentLoaded', () => {
                document.documentElement.classList.add('teacher-mode');
                document.querySelectorAll('.admin-only').forEach(e => e.classList.remove('hidden'));
            });
        }
    </script>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, onSnapshot, setDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // 聯絡簿專用的 Firebase 專案(class-contactbook)。資料存在 config/contactBook。
        const firebaseConfig = { apiKey: "AIzaSyAiT81oV4A-JUmtvNZHNIaN0Vjbf9H0jMo", authDomain: "class-contactbook.firebaseapp.com", projectId: "class-contactbook", storageBucket: "class-contactbook.firebasestorage.app", messagingSenderId: "775848726685", appId: "1:775848726685:web:b0dcdcdb680ad9fff78474" };
        const db = getFirestore(initializeApp(firebaseConfig));
        const auth = getAuth();
        // 帳號只會由你在 Firebase 主控台建立,因此任何成功登入者都視為老師(寫入權限另由 Firestore 規則的 email 清單把關)
        const $ = (id) => document.getElementById(id);
        const bookRef = doc(db, 'config', 'contactBook');

        const WEEKDAYS = ["日","一","二","三","四","五","六"];
        const SUBJ_NAME = {chi:"國語", mat:"數學", sci:"自然", soc:"社會", eng:"英文", etc:"其他"};
        const SUBJ_ORDER = {chi:0, mat:1, sci:2, soc:3, eng:4, etc:5};
        const HW_SUBJ = ["chi","mat","sci","soc","eng","etc"];
        const EXAM_SUBJ = ["chi","mat","sci","soc","eng"];

        let isTeacher = false;
        let editorReady = false;
        let hwEntries = [];   // 手動新增的作業 {id,subj,on,name,lesson,pStart,pEnd}
        let chiPresets = { p1:{on:false,L:"",opt:"甲",a:"",b:""}, p2:{on:false,L:""}, p3:{on:false,opt:"甲",L:"",nStart:"",nEnd:""}, p4:{on:false,L:""}, p5:{on:false,L:""}, p6:{on:false,L:"",a:"",b:""} };
        let matPresets = { m1:{on:false,a:"",b:""}, m2:{on:false,a:"",b:""} };
        let reviewEntries = [];   // {id,subj,on,name}
        let rvChi = {on:false, L:""};   // 國語固定:L幾聽考訂簽
        let examEntries = [];     // {id,subj,on,type,name,lStart,lEnd}
        let wbSign = {chi:{on:false,pStart:"",pEnd:""}, mat:{on:false,pStart:"",pEnd:""}};
        let extras = [];
        let examTiming = "auto";  // auto | 明 | 下一 | 下二
        let className = "508";
        const openSet = {};       // 科目折疊狀態(介面用)
        const openSec = { wb:false, rv:false, ex:false };  // 大段落折疊狀態

        function uid(p){ return p+Math.random().toString(36).slice(2,7); }
        function sTrim(v){ return (v!=null && String(v).trim()!=="") ? String(v).trim() : ""; }
        function pagesText(a,b){
            a=parseInt(a,10); b=parseInt(b,10);
            if(isNaN(a)) return "";
            if(isNaN(b) || b<=a) return ""+a;
            if(b-a>60) return a+"～"+b;
            const arr=[]; for(let i=a;i<=b;i++) arr.push(i);
            return arr.join("、");
        }
        function pTxt(a,b){ const pg=pagesText(a,b); return pg ? ("p."+pg) : ""; }
        function rangeTxt(a,b){ a=sTrim(a); b=sTrim(b); return a ? (a+(b?("～"+b):"")) : ""; }
        const SUBJ_ABBR = {chi:"國", mat:"數", sci:"自", soc:"社", eng:"英", etc:"其"};
        function hwText(e){ const pre=(e.subj==="etc")?"":SUBJ_ABBR[e.subj]; let t=pre+sTrim(e.name); const L=sTrim(e.lesson); if(L)t+=" L"+L; const pg=pTxt(e.pStart,e.pEnd); if(pg)t+=" "+pg; return t; }
        function chiText(){
            const out=[], c=chiPresets;
            if(c.p1.on && sTrim(c.p1.L)){ let t="讀L"+sTrim(c.p1.L)+"課文＋"+(c.p1.opt||"甲")+"本"; const pg=rangeTxt(c.p1.a,c.p1.b); if(pg) t+="p."+pg; out.push(t); }
            if(c.p2.on && sTrim(c.p2.L)) out.push("L"+sTrim(c.p2.L)+"預習單");
            if(c.p3.on && sTrim(c.p3.L)) out.push("生"+(c.p3.opt||"甲")+"L"+sTrim(c.p3.L)+"("+rangeTxt(c.p3.nStart,c.p3.nEnd)+")＋造詞");
            if(c.p4.on && sTrim(c.p4.L)) out.push("L"+sTrim(c.p4.L)+"圈詞2次");
            if(c.p5.on && sTrim(c.p5.L)) out.push("L"+sTrim(c.p5.L)+"句型");
            if(c.p6.on && sTrim(c.p6.L)){ let t="習L"+sTrim(c.p6.L); const pg=rangeTxt(c.p6.a,c.p6.b); if(pg) t+="p."+pg; out.push(t); }
            return out;
        }
        function matText(){
            const out=[], m=matPresets;
            if(m.m1.on){ const pg=rangeTxt(m.m1.a,m.m1.b); if(pg) out.push("習p."+pg); }
            if(m.m2.on){ const pg=rangeTxt(m.m2.a,m.m2.b); if(pg) out.push("簿p."+pg); }
            return out;
        }
        function wbText(s,w){ let t="簽"+SUBJ_ABBR[s]+"習"; const pg=pTxt(w.pStart,w.pEnd); if(pg)t+=" "+pg; return t; }
        function reviewText(e){ const nm=sTrim(e.name); let base = (nm && nm.indexOf("卷")>=0) ? (SUBJ_ABBR[e.subj]+nm) : (nm || SUBJ_NAME[e.subj]); return base+"訂簽（　）分"; }
        function timingWord(){ if(examTiming==="明")return"明"; if(examTiming==="下一")return"下(一)"; if(examTiming==="下二")return"下(二)"; return (new Date().getDay()===5)?"下(一)":"明"; }
        const EXAM_TYPES = ["小考","期中考","期末考"];
        const EXAM_TYPE_ORD = {"小考":0,"期中考":1,"期末考":2};
        function examText(e){ const nm=sTrim(e.name)||SUBJ_ABBR[e.subj]; const tw=(!e.type||e.type==="小考")?"考":e.type; let t=timingWord()+tw+nm; const ls=sTrim(e.lStart), le=sTrim(e.lEnd); if(ls){ t+=" L"+ls+(le?("～L"+le):""); } return t; }

        function buildItems(){
            const out=[];
            HW_SUBJ.forEach(sid=>{
                if(sid==="chi") chiText().forEach(t=> out.push(t));
                if(sid==="mat") matText().forEach(t=> out.push(t));
                hwEntries.filter(e=>e.on && e.subj===sid).forEach(e=>{ if(sTrim(e.name)||sTrim(e.lesson)||pTxt(e.pStart,e.pEnd)) out.push(hwText(e)); });
            });
            ["chi","mat"].forEach(s=>{ const w=wbSign[s]; if(w&&w.on) out.push(wbText(s,w)); });
            EXAM_SUBJ.forEach(sid=>{
                if(sid==="chi" && rvChi.on && sTrim(rvChi.L)) out.push("L"+sTrim(rvChi.L)+"聽考訂簽（　）分");
                reviewEntries.filter(e=>e.on && e.subj===sid).forEach(e=> out.push(reviewText(e)));
            });
            examEntries.filter(e=>e.on).slice().sort((a,b)=> ((EXAM_TYPE_ORD[a.type]??0)-(EXAM_TYPE_ORD[b.type]??0)) || ((SUBJ_ORDER[a.subj]??9)-(SUBJ_ORDER[b.subj]??9))).forEach(e=> out.push(examText(e)));
            extras.forEach(t=>{ if(t&&t.trim()) out.push(t.trim()); });
            return out;
        }
        function arrOf(sec){ return sec==="hw"?hwEntries : sec==="rv"?reviewEntries : sec==="ex"?examEntries : null; }
        function findE(sec,id){ const a=arrOf(sec); return a ? a.find(e=>e.id===id) : null; }
        function newEntry(sec, sid){
            if(sec==="hw") return {id:uid("h"),subj:sid,on:true,name:"",lesson:"",pStart:"",pEnd:""};
            if(sec==="rv") return {id:uid("r"),subj:sid,on:true,name:""};
            return {id:uid("x"),subj:sid,on:true,type:"小考",name:"",lStart:"",lEnd:""};
        }
        function rocParts(){ const n=new Date(); return {y:n.getFullYear()-1911,m:n.getMonth()+1,d:n.getDate(),w:WEEKDAYS[n.getDay()]}; }
        function esc(s){ return String(s).replace(/[&<>]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;"}[c])); }

        function renderPublished(pub){
            const dp = (pub && pub.date) ? pub.date : rocParts();
            $('dateRow').innerHTML = `<span class="dateline"><span class="num">${dp.y}</span><span class="tag y">年</span>`
                + `<span class="num">${dp.m}</span><span class="tag m">月</span>`
                + `<span class="num">${dp.d}</span><span class="tag d">日</span>`
                + `<span class="wkwrap"><span class="tag wk">星期</span><span class="wd">${dp.w}</span></span></span>`
                + ((pub && pub.label) ? `<span class="date-stamp">更新於 ${esc(pub.label)}</span>` : '');

            const items = (pub && pub.items) ? pub.items : [];
            if(!items.length){ $('itemList').innerHTML = `<li class="empty-note">今天還沒有發布聯絡簿</li>`; }
            else { $('itemList').innerHTML = items.map((t,i)=> { const hl=(t.indexOf('簽名')>=0||t.indexOf('訂簽')>=0||t.indexOf('簽')===0)?' hl':''; return `<li><span class="circle">${i+1}</span><span class="txt${hl}">${esc(t)}</span></li>`; }).join(''); }
            requestAnimationFrame(fitCast);
        }

        const IC_UNDO = `<svg viewBox="0 0 24 24" width="19" height="19" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 14 4 9l5-5"/><path d="M4 9h10.5a5.5 5.5 0 0 1 0 11H9"/></svg>`;
        const IC_TRASH = `<svg viewBox="0 0 24 24" width="19" height="19" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18"/><path d="M8 6V4a1 1 0 0 1 1-1h6a1 1 0 0 1 1 1v2"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6M14 11v6"/></svg>`;
        function clearBtn(k){ return `<button class="iconbtn clear" data-clear="${k}" title="清除欄位">${IC_UNDO}</button>`; }
        function delBtn(k){ return `<button class="iconbtn del" data-del="${k}" title="刪除整列">${IC_TRASH}</button>`; }
        function pageFields(k,e){ return `<span class="hw-field">p.<input class="input hw-num" type="number" min="1" value="${esc(e.pStart||'')}" data-f="${k}:pStart"> ～ <input class="input hw-num" type="number" min="1" value="${esc(e.pEnd||'')}" data-f="${k}:pEnd"></span>`; }
        function hwRow(sec,e){ const k=sec+":"+e.id; const noL=(e.subj==="mat");
            return `<div class="hw-row"><input type="checkbox" class="hw-on" data-on="${k}" ${e.on?'checked':''}>`
            + `<input class="input hw-type" placeholder="作業名稱，如 習 / 課 / 卷" value="${esc(e.name||'')}" data-f="${k}:name">`
            + (noL?"":`<span class="hw-field">L<input class="input hw-num" type="number" min="1" value="${esc(e.lesson||'')}" data-f="${k}:lesson"></span>`)
            + pageFields(k,e) + clearBtn(k) + delBtn(k) + `</div>`; }
        function reviewRow(sec,e){ const k=sec+":"+e.id; return `<div class="hw-row"><input type="checkbox" class="hw-on" data-on="${k}" ${e.on?'checked':''}>`
            + `<input class="input hw-type" placeholder="名稱（含「卷」會加科目縮寫）" value="${esc(e.name||'')}" data-f="${k}:name">`
            + `<span class="hw-static">訂簽（　）分</span>`
            + clearBtn(k) + delBtn(k) + `</div>`; }
        function examRow(sec,e){ const k=sec+":"+e.id; const opt=t=>`<option value="${t}" ${(e.type||'小考')===t?'selected':''}>${t}</option>`;
            return `<div class="hw-row"><input type="checkbox" class="hw-on" data-on="${k}" ${e.on?'checked':''}>`
            + `<select class="hw-subj" data-f="${k}:type">${EXAM_TYPES.map(opt).join('')}</select>`
            + `<input class="input hw-type" placeholder="考試名稱（留空＝科目縮寫）" value="${esc(e.name||'')}" data-f="${k}:name">`
            + `<span class="hw-field">L<input class="input hw-num" type="number" min="1" value="${esc(e.lStart||'')}" data-f="${k}:lStart"> ～ L<input class="input hw-num" type="number" min="1" value="${esc(e.lEnd||'')}" data-f="${k}:lEnd"></span>`
            + clearBtn(k) + delBtn(k) + `</div>`; }
        function rvChiRow(){ const r=rvChi; return `<div class="hw-row"><input type="checkbox" class="hw-on" data-rvcon ${r.on?'checked':''}>`
            + `<span class="hw-static">L</span><input class="input hw-num" type="number" min="1" value="${esc(r.L||'')}" data-rvc="L">`
            + `<span class="hw-static">聽考訂簽（　）分</span>`
            + `<button class="iconbtn clear" data-clearrvc title="清除欄位">${IC_UNDO}</button></div>`; }
        function chiPresetRows(){
            const c=chiPresets;
            const optSel=(p,cur)=>`<select class="hw-subj" data-cps="${p}:opt"><option value="甲" ${cur==='甲'?'selected':''}>甲</option><option value="乙" ${cur==='乙'?'selected':''}>乙</option></select>`;
            const num=(p,f,v)=>`<input class="input hw-num" type="number" min="1" value="${esc(v||'')}" data-cp="${p}:${f}">`;
            const onbox=(p,on)=>`<input type="checkbox" class="hw-on" data-cpon="${p}" ${on?'checked':''}>`;
            const cl=(p)=>`<button class="iconbtn clear" data-clearcp="${p}" title="清除欄位">${IC_UNDO}</button>`;
            return `<div class="hw-row">${onbox('p1',c.p1.on)}<span class="hw-static">讀L</span>${num('p1','L',c.p1.L)}<span class="hw-static">課文＋</span>${optSel('p1',c.p1.opt)}<span class="hw-static">本 p.</span>${num('p1','a',c.p1.a)}<span class="hw-static">～</span>${num('p1','b',c.p1.b)}${cl('p1')}</div>`
                + `<div class="hw-row">${onbox('p2',c.p2.on)}<span class="hw-static">L</span>${num('p2','L',c.p2.L)}<span class="hw-static">預習單</span>${cl('p2')}</div>`
                + `<div class="hw-row">${onbox('p3',c.p3.on)}<span class="hw-static">生</span>${optSel('p3',c.p3.opt)}<span class="hw-static">L</span>${num('p3','L',c.p3.L)}<span class="hw-static">(</span>${num('p3','nStart',c.p3.nStart)}<span class="hw-static">～</span>${num('p3','nEnd',c.p3.nEnd)}<span class="hw-static">)＋造詞</span>${cl('p3')}</div>`
                + `<div class="hw-row">${onbox('p4',c.p4.on)}<span class="hw-static">L</span>${num('p4','L',c.p4.L)}<span class="hw-static">圈詞2次</span>${cl('p4')}</div>`
                + `<div class="hw-row">${onbox('p5',c.p5.on)}<span class="hw-static">L</span>${num('p5','L',c.p5.L)}<span class="hw-static">句型</span>${cl('p5')}</div>`
                + `<div class="hw-row">${onbox('p6',c.p6.on)}<span class="hw-static">習L</span>${num('p6','L',c.p6.L)}<span class="hw-static">p.</span>${num('p6','a',c.p6.a)}<span class="hw-static">～</span>${num('p6','b',c.p6.b)}${cl('p6')}</div>`;
        }
        function matPresetRows(){
            const m=matPresets;
            const num=(p,f,v)=>`<input class="input hw-num" type="number" min="1" value="${esc(v||'')}" data-mp="${p}:${f}">`;
            const onbox=(p,on)=>`<input type="checkbox" class="hw-on" data-mpon="${p}" ${on?'checked':''}>`;
            const cl=(p)=>`<button class="iconbtn clear" data-clearmp="${p}" title="清除欄位">${IC_UNDO}</button>`;
            return `<div class="hw-row">${onbox('m1',m.m1.on)}<span class="hw-static">習 p.</span>${num('m1','a',m.m1.a)}<span class="hw-static">～</span>${num('m1','b',m.m1.b)}${cl('m1')}</div>`
                + `<div class="hw-row">${onbox('m2',m.m2.on)}<span class="hw-static">簿 p.</span>${num('m2','a',m.m2.a)}<span class="hw-static">～</span>${num('m2','b',m.m2.b)}${cl('m2')}</div>`;
        }
        function accordion(sec, subjList, entriesArr, rowFn){
            return subjList.map(sid=>{
                const isChi = (sec==="hw" && sid==="chi");
                const isMat = (sec==="hw" && sid==="mat");
                const isRvChi = (sec==="rv" && sid==="chi");
                const ents = entriesArr.filter(e=>e.subj===sid);
                const open = !!openSet[sec+":"+sid];
                let cc = ents.filter(e=>e.on).length;
                if(isChi) cc += Object.keys(chiPresets).filter(p=>chiPresets[p].on).length;
                if(isMat) cc += Object.keys(matPresets).filter(p=>matPresets[p].on).length;
                if(isRvChi && rvChi.on) cc += 1;
                let body="";
                if(open){
                    if(isChi) body += chiPresetRows();
                    if(isMat) body += matPresetRows();
                    if(isRvChi) body += rvChiRow();
                    body += ents.map(e=>rowFn(sec,e)).join('') + `<button class="add-line-btn" data-add="${sec}:${sid}">＋ 新增</button>`;
                }
                return `<div class="acc ${open?'open':''}">`
                    + `<div class="acc-head" data-acc="${sec}:${sid}"><span class="acc-arrow">${open?'▾':'▸'}</span><span class="acc-name">${esc(SUBJ_NAME[sid])}</span>${cc?`<span class="acc-badge">${cc}</span>`:''}</div>`
                    + `<div class="acc-body">${body}</div></div>`;
            }).join('');
        }
        function secCount(sec){
            if(sec==="wb") return ["chi","mat"].filter(s=>wbSign[s]&&wbSign[s].on).length;
            if(sec==="rv") return reviewEntries.filter(e=>e.on).length + (rvChi.on?1:0);
            if(sec==="ex") return examEntries.filter(e=>e.on).length;
            return 0;
        }
        function secHead(sec, label){ const open=openSec[sec]; const c=secCount(sec); return `<h2 class="sec-title" data-sec="${sec}"><span class="acc-arrow">${open?'▾':'▸'}</span>${label}${c?`<span class="acc-badge">${c}</span>`:''}</h2>`; }
        function clearAllChecks(){
            hwEntries.forEach(e=>e.on=false);
            Object.values(chiPresets).forEach(p=>p.on=false);
            Object.values(matPresets).forEach(p=>p.on=false);
            ["chi","mat"].forEach(s=>{ if(wbSign[s]) wbSign[s].on=false; });
            reviewEntries.forEach(e=>e.on=false);
            rvChi.on=false;
            examEntries.forEach(e=>e.on=false);
        }
        function renderEditor(){
            $('hwList').innerHTML = accordion('hw', HW_SUBJ, hwEntries, hwRow);

            $('wbHead').innerHTML = secHead('wb','習作簽名');
            $('wbList').style.display = openSec.wb ? 'block' : 'none';
            $('wbList').innerHTML = ["chi","mat"].map(s=>{ const w=wbSign[s]||{};
                return `<div class="hw-row"><input type="checkbox" class="hw-on" data-wbon="${s}" ${w.on?'checked':''}><span class="hw-static">${esc(SUBJ_NAME[s])}習作簽名</span>`
                    + `<span class="hw-field">p.<input class="input hw-num" type="number" min="1" value="${esc(w.pStart||'')}" data-wb="${s}:pStart"> ～ <input class="input hw-num" type="number" min="1" value="${esc(w.pEnd||'')}" data-wb="${s}:pEnd"></span>`
                    + `<button class="iconbtn clear" data-clearwb="${s}" title="清除頁數">${IC_UNDO}</button></div>`;
            }).join('');

            $('rvHead').innerHTML = secHead('rv','考試訂簽');
            $('reviewList').style.display = openSec.rv ? 'block' : 'none';
            $('reviewList').innerHTML = accordion('rv', EXAM_SUBJ, reviewEntries, reviewRow);

            $('exHead').innerHTML = secHead('ex','考試');
            $('examWrap').style.display = openSec.ex ? 'block' : 'none';
            const tOpt=(v,lbl)=>`<option value="${v}" ${examTiming===v?'selected':''}>${lbl}</option>`;
            $('examTiming').innerHTML = `<label class="hw-field">考試時機：<select class="hw-subj" id="timingSel">${tOpt('auto','自動(週五自動變下一)')}${tOpt('明','明天')}${tOpt('下一','下(一)')}${tOpt('下二','下(二)')}</select></label>`;
            $('examList').innerHTML = accordion('ex', EXAM_SUBJ, examEntries, examRow);

            $('extraList').innerHTML = extras.map((t,i)=>
                `<div class="extra-row"><input class="input" value="${esc(t)}" data-ex="${i}" placeholder="輸入事項，如 帶大袋子"><button class="iconbtn del" data-del-ex="${i}" title="刪除">${IC_TRASH}</button></div>`
            ).join('');
        }

        let saveTimer = null;
        function saveConfig(){ clearTimeout(saveTimer); saveTimer=setTimeout(()=>{ setDoc(bookRef,{hwEntries,chiPresets,matPresets,reviewEntries,rvChi,examEntries,wbSign,examTiming,extras,className},{merge:true}).catch(e=>console.warn(e)); },700); }
        async function publish(){
            const dp = rocParts(); const now = new Date();
            const label = `${dp.y}/${dp.m}/${dp.d} ${now.getHours()}:${("0"+now.getMinutes()).slice(-2)}`;
            try{ await setDoc(bookRef,{hwEntries,chiPresets,matPresets,reviewEntries,rvChi,examEntries,wbSign,examTiming,extras,className,published:{items:buildItems(),date:dp,label}},{merge:true}); $('pubStamp').textContent="已發布 · "+label; }
            catch(e){ ask("發布失敗，請確認已登入且 Firestore 規則允許寫入", {alert:true}); console.warn(e); }
        }

        let lastData = null;
        function loadEditorFrom(data){
            if(data){
                if(Array.isArray(data.hwEntries)) hwEntries=data.hwEntries;
                if(data.chiPresets && typeof data.chiPresets==='object'){ Object.keys(chiPresets).forEach(p=>{ if(data.chiPresets[p]) Object.assign(chiPresets[p], data.chiPresets[p]); }); }
                if(data.matPresets && typeof data.matPresets==='object'){ Object.keys(matPresets).forEach(p=>{ if(data.matPresets[p]) Object.assign(matPresets[p], data.matPresets[p]); }); }
                if(Array.isArray(data.reviewEntries)) reviewEntries=data.reviewEntries;
                if(data.rvChi && typeof data.rvChi==='object') Object.assign(rvChi, data.rvChi);
                if(Array.isArray(data.examEntries)) examEntries=data.examEntries;
                if(data.wbSign && typeof data.wbSign==='object') wbSign=Object.assign({chi:{on:false,pStart:"",pEnd:""},mat:{on:false,pStart:"",pEnd:""}}, data.wbSign);
                if(typeof data.examTiming==='string') examTiming=data.examTiming;
                if(Array.isArray(data.extras)) extras=data.extras;
            }
            editorReady=true; renderEditor();
        }
        function markReady(){ document.body.classList.add('ready'); }
        setTimeout(markReady, 4000);
        onSnapshot(bookRef, (snap)=>{
            const data = snap.exists() ? snap.data() : null;
            lastData = data;
            if(data){
                if(data.className){ className=data.className; }
                $('className').innerText=className;
                renderPublished(data.published || null);
                if(isTeacher && !editorReady) loadEditorFrom(data);
            } else { $('className').innerText=className; renderPublished(null); }
            markReady();
        }, err=>{ console.warn(err); $('className').innerText=className; renderPublished(null); markReady(); });

        // 兩位老師共用同一組編輯帳號:email 寫死在這裡,老師只需輸入密碼。把下面換成你那組共用編輯帳號的 email。
        const SHARED_EMAIL = "annychen1210@gmail.com";
        window.ask = (msg, opts) => {
            opts = opts || {};
            const alertOnly = opts.alert, isInput = opts.input;
            return new Promise(res => {
                const m = $('modal'); $('modal-msg').textContent = msg;
                const ok = $('modal-ok'), no = $('modal-no'), inp = $('modal-input');
                no.style.display = alertOnly ? 'none' : '';
                inp.style.display = isInput ? 'block' : 'none';
                if(isInput){ inp.value = opts.value || ''; }
                m.classList.add('show');
                if(isInput){ setTimeout(()=>{ inp.focus(); inp.select(); }, 50); }
                const done = v => { m.classList.remove('show'); ok.onclick = null; no.onclick = null; inp.onkeydown = null; res(v); };
                ok.onclick = () => done(isInput ? inp.value : true);
                no.onclick = () => done(isInput ? null : false);
                if(isInput){ inp.onkeydown = e => { if(e.key === 'Enter') ok.onclick(); if(e.key === 'Escape') no.onclick(); }; }
            });
        };
        window.checkPass = async () => {
            const pw=$('passInput').value; if(!pw){ ask('請輸入密碼', {alert:true}); return; }
            try{ await signInWithEmailAndPassword(auth,SHARED_EMAIL,pw); window.closeModal(); }
            catch(err){ ask("密碼錯誤", {alert:true}); $('passInput').value=''; $('passInput').focus(); }
        };
        window.closeModal = () => { $('inputModal').style.display='none'; $('passInput').value=''; $('imeHint').style.display='none'; };
        window.openLogin = () => { $('passInput').value=''; $('imeHint').style.display='none'; $('inputModal').style.display='flex'; setTimeout(()=>$('passInput').focus(),50); };

        let bagTaps=0, bagTimer=null;
        document.querySelector('.bag').addEventListener('click', ()=>{
            bagTaps++; clearTimeout(bagTimer); bagTimer=setTimeout(()=>{bagTaps=0;},600);
            if(bagTaps>=3){ bagTaps=0; clearTimeout(bagTimer);
                if(isTeacher){ signOut(auth); } else { window.openLogin(); }
            }
        });
        $('passInput').addEventListener('keydown', e=>{ if(e.key==='Enter') window.checkPass(); });
        const checkIME = ()=>{ $('imeHint').style.display = /[^\x00-\x7F]/.test($('passInput').value) ? 'block' : 'none'; };
        $('passInput').addEventListener('compositionstart', ()=>{ $('imeHint').style.display='block'; });
        $('passInput').addEventListener('input', e=>{ if(e.isComposing){ $('imeHint').style.display='block'; } else { checkIME(); } });
        $('passInput').addEventListener('compositionend', checkIME);

        function applyTeacherUI(){
            if(isTeacher){
                localStorage.setItem('teacherHint','1');
                document.documentElement.classList.add('teacher-mode');
                document.querySelectorAll('.admin-only').forEach(e=>e.classList.remove('hidden'));
                if(!editorReady){ if(lastData) loadEditorFrom(lastData); else renderEditor(); }
            } else {
                localStorage.removeItem('teacherHint');
                document.documentElement.classList.remove('teacher-mode');
                document.querySelectorAll('.admin-only').forEach(e=>e.classList.add('hidden'));
            }
        }
        onAuthStateChanged(auth, (user)=>{ isTeacher=!!user; applyTeacherUI(); });

        document.addEventListener('input', e=>{
            const t=e.target;
            if(t.dataset.f){ const p=t.dataset.f.split(':'); const en=findE(p[0],p[1]); if(en){ en[p[2]]=t.value; saveConfig(); } }
            if(t.dataset.cp){ const p=t.dataset.cp.split(':'); chiPresets[p[0]][p[1]]=t.value; saveConfig(); }
            if(t.dataset.mp){ const p=t.dataset.mp.split(':'); matPresets[p[0]][p[1]]=t.value; saveConfig(); }
            if(t.dataset.rvc){ rvChi[t.dataset.rvc]=t.value; saveConfig(); }
            if(t.dataset.wb){ const p=t.dataset.wb.split(':'); wbSign[p[0]]=wbSign[p[0]]||{}; wbSign[p[0]][p[1]]=t.value; saveConfig(); }
            if(t.dataset.ex!=null){ extras[+t.dataset.ex]=t.value; saveConfig(); }
        });
        document.addEventListener('change', e=>{
            const t=e.target; let reRender=false;
            if(t.dataset.f){ const p=t.dataset.f.split(':'); const en=findE(p[0],p[1]); if(en){ en[p[2]]=t.value; saveConfig(); } }
            if(t.dataset.cps){ const p=t.dataset.cps.split(':'); chiPresets[p[0]][p[1]]=t.value; saveConfig(); }
            if(t.dataset.cpon){ chiPresets[t.dataset.cpon].on=t.checked; saveConfig(); reRender=true; }
            if(t.dataset.mpon){ matPresets[t.dataset.mpon].on=t.checked; saveConfig(); reRender=true; }
            if(t.hasAttribute && t.hasAttribute('data-rvcon')){ rvChi.on=t.checked; saveConfig(); reRender=true; }
            if(t.dataset.on){ const p=t.dataset.on.split(':'); const en=findE(p[0],p[1]); if(en){ en.on=t.checked; saveConfig(); reRender=true; } }
            if(t.dataset.wbon){ const s=t.dataset.wbon; wbSign[s]=wbSign[s]||{}; wbSign[s].on=t.checked; saveConfig(); reRender=true; }
            if(t.id==="timingSel"){ examTiming=t.value; saveConfig(); }
            if(reRender) renderEditor();
        });
        document.addEventListener('click', e=>{
            const secT=e.target.closest('.sec-title');
            if(secT){ const s=secT.dataset.sec; openSec[s]=!openSec[s]; renderEditor(); return; }
            // 清除欄位(收回圖示)
            const clr=e.target.closest('[data-clear]');
            if(clr){ const p=clr.dataset.clear.split(':'); const en=findE(p[0],p[1]); if(en){ if(p[0]==="hw"){en.lesson="";en.pStart="";en.pEnd="";} else if(p[0]==="ex"){en.lStart="";en.lEnd="";} else if(p[0]==="rv"){en.name="";} renderEditor(); saveConfig(); } return; }
            const clrcp=e.target.closest('[data-clearcp]');
            if(clrcp){ const c=chiPresets[clrcp.dataset.clearcp]; ["L","a","b","nStart","nEnd"].forEach(f=>{ if(f in c) c[f]=""; }); renderEditor(); saveConfig(); return; }
            const clrmp=e.target.closest('[data-clearmp]');
            if(clrmp){ const m=matPresets[clrmp.dataset.clearmp]; ["a","b"].forEach(f=>{ if(f in m) m[f]=""; }); renderEditor(); saveConfig(); return; }
            const clrwb=e.target.closest('[data-clearwb]');
            if(clrwb){ const s=clrwb.dataset.clearwb; if(wbSign[s]){ wbSign[s].pStart="";wbSign[s].pEnd=""; renderEditor(); saveConfig(); } return; }
            const clrrvc=e.target.closest('[data-clearrvc]');
            if(clrrvc){ rvChi.L=""; renderEditor(); saveConfig(); return; }
            // 刪除整列(垃圾桶圖示)
            const del=e.target.closest('[data-del]');
            if(del){ const p=del.dataset.del.split(':'); const a=arrOf(p[0]); if(a){ const i=a.findIndex(x=>x.id===p[1]); if(i>=0){ a.splice(i,1); renderEditor(); saveConfig(); } } return; }
            const delEx=e.target.closest('[data-del-ex]');
            if(delEx){ extras.splice(+delEx.dataset.delEx,1); renderEditor(); saveConfig(); return; }
            const head=e.target.closest('.acc-head');
            if(head){ const k=head.dataset.acc; openSet[k]=!openSet[k]; renderEditor(); return; }
            const add=e.target.closest('[data-add]');
            if(add){ const p=add.dataset.add.split(':'); const a=arrOf(p[0]); if(a){ a.push(newEntry(p[0],p[1])); renderEditor(); saveConfig(); } return; }
        });
        $('clearAll').onclick = async ()=>{ if(await ask('要清除所有「勾選」嗎？（你設定的項目會保留，只是全部取消打勾，方便開始新的一天）')){ clearAllChecks(); renderEditor(); saveConfig(); } };
        $('addExtra').onclick = ()=>{ extras.push(""); renderEditor(); saveConfig(); };
        $('publishBtn').onclick = publish;
        $('copyLink').onclick = ()=>{
            const url=location.origin+location.pathname;
            if(navigator.clipboard){ navigator.clipboard.writeText(url).then(()=>ask("已複製家長連結", {alert:true}),()=>prompt("家長連結：",url)); }
            else prompt("家長連結：",url);
        };
        $('editClassBtn').onclick = async ()=>{
            const v = await ask('更新班級', {input:true, value:className});
            if(v && v.trim()){ className=v.trim(); $('className').innerText=className; setDoc(bookRef,{className},{merge:true}); }
        };
        $('logoutBtn').onclick = ()=> signOut(auth);

        // 投影模式:按鈕或網址 #cast 切換;Esc 離開。藏掉編輯區與按鈕、字級放大、全螢幕置中。
        function fitCast(){
            const html=document.documentElement;
            if(!html.classList.contains('cast-mode')) return;
            const dr=document.querySelector('.date-row');
            const ul=document.querySelector('.items');
            const tray=document.querySelector('.chalk-tray');
            const frame=document.querySelector('.frame');
            if(!dr || !ul || !frame) return;
            const realN=Math.max(ul.querySelectorAll('li').length, 1);
            const refN=Math.max(realN, 7);   // always size as if there were at least 7 rows
            let size=240;   // 上限拉高,大屏可等比例放大;放不下才往下縮
            html.style.setProperty('--castItem', size+'px');
            for(let i=0;i<120;i++){
                const topGap=parseFloat(getComputedStyle(frame).paddingTop)||0;
                const refItems=ul.offsetHeight*(refN/realN);
                const need=topGap + dr.offsetHeight + refItems + (tray?tray.offsetHeight:0) + 28;
                if(need <= window.innerHeight || size<=22) break;
                size-=4; html.style.setProperty('--castItem', size+'px');
            }
        }
        function setCast(on){
            document.documentElement.classList.toggle('cast-mode', on);
            if(on){ if(location.hash!=='#cast') history.replaceState(null,'','#cast'); requestAnimationFrame(fitCast); setTimeout(fitCast,350); }
            else if(location.hash==='#cast'){ history.replaceState(null,'',location.pathname+location.search); }
        }
        $('castBtn').onclick = ()=> setCast(true);
        $('castExit').onclick = ()=> setCast(false);
        document.addEventListener('keydown', e=>{ if(e.key==='Escape') setCast(false); });
        window.addEventListener('resize', ()=> requestAnimationFrame(fitCast));
        if(document.fonts && document.fonts.ready) document.fonts.ready.then(()=> requestAnimationFrame(fitCast));
        if(location.hash==='#cast') setCast(true);
    </script>
</body>
</html>
